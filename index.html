    var ds=d.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})+" · "+
           d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});
    return'<div class="tl-entry">'+
      '<div class="tl-dot done">●</div>'+
      '<div class="tl-body">'+
        '<div class="tl-msg">'+esc(e.msg)+'</div>'+
        '<div class="tl-ts">'+ds+'</div>'+
      '</div>'+
    '</div>';
  }).join("")+'</div>';
}

/* ════════════════════════════════════════════════════════════════
   FEATURE 3 — SOURCE ANALYTICS (injected into rDashboard)
════════════════════════════════════════════════════════════════ */
function rSourceAnalytics(){
  var all=leads;
  var srcMap={};
  all.forEach(function(l){
    var s=l.source||"Unknown";
    if(!srcMap[s])srcMap[s]={total:0,enrolled:0};
    srcMap[s].total++;
    if(l.fee.done&&l.fee.amountPaid)srcMap[s].enrolled++;
  });
  var srcs=Object.keys(srcMap).sort(function(a,b){return srcMap[b].total-srcMap[a].total});
  var maxN=srcs.reduce(function(m,s){return Math.max(m,srcMap[s].total)},0)||1;
  return srcs.map(function(s){
    var d=srcMap[s];
    var pct=Math.round(d.total/maxN*100);
    var conv=d.total?Math.round(d.enrolled/d.total*100):0;
    return'<div class="source-row">'+
      '<div class="source-meta">'+
        '<span class="source-name">'+esc(s)+'</span>'+
        '<span class="source-stats">'+d.total+' leads · '+conv+'% conv.</span>'+
      '</div>'+
      '<div class="source-track"><div class="source-fill" style="width:'+pct+'%"></div></div>'+
    '</div>';
  }).join("");
}

/* ════════════════════════════════════════════════════════════════
   FEATURE 4 — SEAT CAPACITY (injected into rDashboard)
════════════════════════════════════════════════════════════════ */
function rSeatCapacity(){
  var filled={};
  leads.forEach(function(l){
    if((l.stage==="admission"||l.stage==="fee")&&l.program){
      filled[l.program]=(filled[l.program]||0)+1;
    }
  });
  return Object.keys(SEATS).map(function(prog){
    var s=SEATS[prog];
    var n=filled[prog]||0;
    var pct=Math.round(n/s.total*100);
    var barC=pct>=90?"var(--red)":pct>=70?"var(--amber-h)":"var(--green)";
    return'<div class="seat-card">'+
      '<div class="seat-prog">'+s.label+'</div>'+
      '<div class="seat-nums">'+
        '<span class="seat-filled" style="color:'+barC+'">'+n+'</span>'+
        '<span class="seat-total">/ '+s.total+'</span>'+
      '</div>'+
      '<div class="seat-bar-wrap"><div class="seat-bar" style="width:'+pct+'%;background:'+barC+'"></div></div>'+
    '</div>';
  }).join("");
}

/* ════════════════════════════════════════════════════════════════
   FEATURE 6 — SIBLING LINKING
════════════════════════════════════════════════════════════════ */
function pSiblingLink(){
  if(!cLead.siblingIds)cLead.siblingIds=[];
  var sibs=cLead.siblingIds.map(function(id){return leads.find(function(l){return l.id===id})}).filter(Boolean);
  var sibCards=sibs.map(function(s){
    return'<div class="sibling-card">'+
      '<div class="av" style="background:'+av(s.id)+';width:30px;height:30px;font-size:11px">'+ini(s.parentName)+'</div>'+
      '<div class="sibling-info">'+
        '<div class="sibling-name">'+esc(s.childName||s.parentName)+'</div>'+
        '<div class="sibling-meta">'+esc(s.parentName)+(s.program?" · "+esc(s.program):"")+'</div>'+
      '</div>'+
      '<button class="sibling-unlink" onclick="unlinkSib('+s.id+')">Unlink</button>'+
    '</div>';
  }).join("");

  var avail=leads.filter(function(l){
    return l.id!==cLead.id&&cLead.siblingIds.indexOf(l.id)<0;
  });
  var opts='<option value="">Select a lead to link as sibling…</option>'+
    avail.map(function(l){
      return'<option value="'+l.id+'">'+(l.childName||l.parentName)+" — "+esc(l.phone)+'</option>';
    }).join("");

  return(sibCards?sibCards:"")+
    '<div class="fld" style="margin-top:8px">'+
      '<label>Link sibling lead</label>'+
      '<select id="sib-sel" onchange="linkSib(this.value)">'+opts+'</select>'+
    '</div>';
}
function linkSib(id){
  id=parseInt(id);if(!id)return;
  if(!cLead.siblingIds)cLead.siblingIds=[];
  if(cLead.siblingIds.indexOf(id)<0){
    cLead.siblingIds.push(id);
    var other=leads.find(function(l){return l.id===id});
    if(other){if(!other.siblingIds)other.siblingIds=[];if(other.siblingIds.indexOf(cLead.id)<0)other.siblingIds.push(cLead.id);}
  }
  var sel=document.getElementById("sib-sel");if(sel)sel.value="";
  renderMdl();
}
function unlinkSib(id){
  if(!cLead.siblingIds)return;
  cLead.siblingIds=cLead.siblingIds.filter(function(x){return x!==id});
  var other=leads.find(function(l){return l.id===id});
  if(other&&other.siblingIds)other.siblingIds=other.siblingIds.filter(function(x){return x!==cLead.id});
  renderMdl();
}

/* ════════════════════════════════════════════════════════════════
   FEATURE 7 — FEE OUTSTANDING VIEW
════════════════════════════════════════════════════════════════ */
function rOutstanding(){
  // Admitted & fee not done, or partially paid
  var pending=leads.filter(function(l){
    return l.admissionForm.schoolConfirmed&&(!l.fee.done||!l.fee.amountPaid);
  });

  var on=el("outstanding-n");
  if(on)on.textContent=pending.length||"";

  if(!pending.length){
    el("view-outstanding").innerHTML=
      '<div class="today-empty"><div class="today-empty-ico">💰</div>'+
      '<div style="font-weight:700;font-size:14px;color:var(--ink-2);margin-bottom:4px">No outstanding fees</div>'+
      '<div>All admitted families have cleared payment</div></div>';
    return;
  }

  // Estimate outstanding (fee structure lookup already in pFee — use program label)
  function estFee(l){
    var f=FEE_STRUCT[l.program||""];
    if(!f)return"";
    var plan=l.fee.paymentPlan||"Annual";
    var amt=f[plan]||"";
    var paid=parseFloat(l.fee.amountPaid)||0;
    var total=parseFloat(String(amt).replace(/,/g,""))||0;
    var bal=total-paid;
    return bal>0?"₹"+bal.toLocaleString("en-IN")+" due":"₹"+total.toLocaleString("en-IN")+" (not started)";
  }

  var total=pending.length;
  var header='<div class="outstanding-total">'+
    '<div class="outstanding-total-left">'+
      '<div class="outstanding-label">Families awaiting payment</div>'+
      '<div class="outstanding-amt">'+total+'</div>'+
      '<div class="outstanding-sub">Admission confirmed · fee not collected</div>'+
    '</div>'+
    '<div>'+
      '<button class="btn btn-cta" onclick="copyAllFeeWA()">💬 Send all WA reminders</button>'+
    '</div>'+
  '</div>';

  var rows=pending.map(function(l){
    var est=estFee(l);
    return'<div class="action-row" style="border-left-color:var(--red)" onclick="openLead('+l.id+')">'+
      '<div class="action-ico" style="background:var(--red-bg)">💰</div>'+
      '<div class="action-info">'+
        '<div class="action-name">'+esc(l.childName||l.parentName)+'</div>'+
        '<div class="action-detail">'+esc(l.parentName)+" · "+esc(l.phone)+(l.program?" · "+esc(l.program):"")+'</div>'+
      '</div>'+
      '<div class="action-meta">'+
        '<span class="card-id">'+esc(l.bbkId||"")+'</span>'+
        (est?'<span class="action-urgent" style="background:var(--red-bg);color:var(--red)">'+est+'</span>':"")+
      '</div>'+
    '</div>';
  }).join("");

  el("view-outstanding").innerHTML=header+rows;
}

function copyAllFeeWA(){
  var pending=leads.filter(function(l){return l.admissionForm.schoolConfirmed&&(!l.fee.done||!l.fee.amountPaid)});
  var msgs=pending.map(function(l){
    return"Dear "+(l.parentName.split(" ")[0]||"Parent")+", this is a reminder from BumbleB Kidz. "+
      (l.childName||"Your child")+"'s admission has been confirmed. Kindly complete the fee payment at the earliest. Call us on 9824821207. — Team BumbleB Kidz 🐝";
  }).join("\n\n---\n\n");
  navigator.clipboard.writeText(msgs).then(function(){toast("All fee reminder messages copied ✓")});
}

function downloadAllFirstBuzz(){
  var valid=leads.filter(function(l){return l.firstBuzz.done||l.childName||l.parentName});
  if(!valid.length){toast("No leads with data to export");return;}
  valid.forEach(function(l,i){
    setTimeout(function(){downloadFirstBuzz(l);},i*400);
  });
  toast("Opening "+valid.length+" form"+(valid.length>1?"s":"")+" — allow popups if blocked");
}

/* ═══════════════ PERSISTENCE ═══════════════ */
var LS_KEY="bbk_crm_v8";
var LS_BAK="bbk_crm_v8_bak";
var ONE_YEAR_MS=365*24*60*60*1000;
var _sbClient=null;
var _sbReady=false;
var _suppressRemoteUpdate=false;
var _realtimeChannel=null;

/* Hardcoded Supabase credentials — shared across all devices */
var SB_URL="https://ejiuwjjrfuxnldhqbzxc.supabase.co";
var SB_KEY="sb_publishable_c4TtqxeWp0uSoQQ3ziYYcQ_0HffAQIO";

/* ── Sync status UI ──────────────────────── */
function setSyncStatus(state,label){
  var el2=document.getElementById("sync-status");
  var lb=document.getElementById("sync-label");
  if(!el2||!lb)return;
  el2.className="";
  if(state==="synced")el2.classList.add("synced");
  else if(state==="saving")el2.classList.add("saving");
  else if(state==="error")el2.classList.add("error");
  lb.textContent=label||"";
}

/* ── localStorage helpers (offline fallback) ── */
function lsSaveLocal(){
  try{
    var payload=JSON.stringify({
      leads:leads,leadCounter:leadCounter,
      savedAt:new Date().toISOString(),
      expiresAt:new Date(Date.now()+ONE_YEAR_MS).toISOString()
    });
    localStorage.setItem(LS_KEY,payload);
    localStorage.setItem(LS_BAK,payload);
  }catch(e){}
}

function lsLoadLocal(){
  try{
    var raw=localStorage.getItem(LS_KEY)||localStorage.getItem(LS_BAK);
    if(!raw)return false;
    var d=JSON.parse(raw);
    if(!d||!d.leads||!d.leads.length)return false;
    applyLeads(d.leads,d.leadCounter);
    return true;
  }catch(e){return false;}
}

function applyLeads(arr,counter){
  leads=arr;
  leadCounter=counter||arr.length;
  leads.forEach(function(l){
    if(!l.activityLog)l.activityLog=[];
    if(!l.siblingIds)l.siblingIds=[];
    if(!l.lastTouched)l.lastTouched="";
    if(!l.screening.scores)l.screening.scores={};
    if(!l.screening.qa)l.screening.qa={};
    // Migrate: ensure programs array exists
    if(!l.programs)l.programs=l.program?[l.program]:[];
    // Migrate: sync fee.program from l.program if blank
    if(l.program&&!l.fee.program)l.fee.program=l.program;
    // Migrate: ensure admissionForm.docs object exists
    if(!l.admissionForm.docs)l.admissionForm.docs={};
  });
}

/* ── Main save — Supabase (primary) + localStorage (backup) ── */
function lsSave(){
  lsSaveLocal();
  if(!_sbReady||!_sbClient)return;
  setSyncStatus("saving","Saving…");
  _suppressRemoteUpdate=true;
  _sbClient
    .from("bbk_crm")
    .upsert({id:1,leads:leads,lead_counter:leadCounter,saved_at:new Date().toISOString()})
    .then(function(res){
      if(res.error){
        setSyncStatus("error","Save failed");
        console.error("Supabase save error:",res.error);
      } else {
        setSyncStatus("synced","Synced");
      }
      setTimeout(function(){_suppressRemoteUpdate=false;},800);
    });
}

/* ── Supabase init + real-time listener ────── */
function initSupabase(){
  try{
    _sbClient=supabase.createClient(SB_URL,SB_KEY);
    setSyncStatus("saving","Connecting…");

    _sbClient.from("bbk_crm").select("leads,lead_counter").eq("id",1).single()
      .then(function(res){
        if(res.data&&Array.isArray(res.data.leads)){
          applyLeads(res.data.leads,res.data.lead_counter);
          lsSaveLocal();
          renderView();
        } else if(leads.length){
          lsSave();
        }
        _sbReady=true;
        setSyncStatus("synced","Live");
        subscribeRealtime();
      })
      .catch(function(err){
        setSyncStatus("error","Connect failed");
        console.error("Supabase fetch error:",err);
      });
  }catch(e){
    setSyncStatus("error","Supabase error");
    console.error("Supabase init error:",e);
  }
}

function subscribeRealtime(){
  if(_realtimeChannel)return;
  _realtimeChannel=_sbClient
    .channel("bbk_crm_changes")
    .on("postgres_changes",
      {event:"UPDATE",schema:"public",table:"bbk_crm",filter:"id=eq.1"},
      function(payload){
        if(_suppressRemoteUpdate)return;
        var d=payload.new;
        if(d&&Array.isArray(d.leads)){
          applyLeads(d.leads,d.lead_counter);
          lsSaveLocal();
          renderView();
          setSyncStatus("synced","Live");
          toast("🔄 Updated from another device");
        }
      }
    )
    .subscribe();
}

function lsLoad(){return lsLoadLocal();}

function deleteLead(){
  if(editId===null)return;
  var l=leads.filter(function(x){return x.id===editId;})[0];
  var name=l?(l.parentName||l.childName||"this lead"):"this lead";
  if(!confirm("Delete "+name+"? This cannot be undone."))return;
  leads=leads.filter(function(x){return x.id!==editId;});
  closeMdl();
  lsSave();
  renderView();
  toast("Lead deleted.");
}

function lsClear(){
  var code=prompt("Type DELETE to confirm wiping all data. This cannot be undone.");
  if(code!=="DELETE")return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_BAK);
  leads=[];leadCounter=0;
  lsSave();renderView();
  toast("All data cleared. Ready for real leads.");
}

// Auto-backup every 30 min
setInterval(function(){lsSave();},30*60*1000);

      l.childName, l.childAge, l.firstBuzz.childDOB,

      l.outreach.visitDate, l.outreach.visitTime,
      l.outreach.visitBooked?"Yes":"No", l.outreach.visitDone?"Yes":"No",

      l.fee.paymentMode, l.fee.receiptNo, l.fee.paymentDate,

    ]);

    }).join(",");
  }).join("\n");

  var bom="\uFEFF"; // UTF-8 BOM for Excel

function importBackup(){
  var inp=document.createElement("input");
  inp.type="file";inp.accept=".json,.csv,application/json,text/csv";
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var isCSV=file.name.toLowerCase().endsWith(".csv");
        if(isCSV){
          importFromCSV(e.target.result);
        } else {
          var d=JSON.parse(e.target.result);
          if(!d.leads||!Array.isArray(d.leads))throw new Error("Invalid file");
          if(!confirm("Import "+d.leads.length+" leads? This will REPLACE your current data."))return;
          leads=d.leads;
          leadCounter=d.leadCounter||d.leads.length;
          leads.forEach(function(l){
            if(!l.activityLog)l.activityLog=[];
            if(!l.siblingIds)l.siblingIds=[];
            if(!l.screening.scores)l.screening.scores={};
            if(!l.screening.qa)l.screening.qa={};
          });
          lsSave();renderView();
          toast("Imported "+leads.length+" leads ✓");
        }
      }catch(ex){alert("Could not read file: "+ex.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

function importFromCSV(csvText){
  // Strip UTF-8 BOM if present
  if(csvText.charCodeAt(0)===0xFEFF)csvText=csvText.slice(1);
  var lines=csvText.split(/\r?\n/).filter(function(l){return l.trim();});
  if(lines.length<2){alert("CSV has no data rows.");return;}

  // Parse CSV respecting quoted fields
  function parseRow(line){
    var cols=[];var cur="";var inQ=false;
    for(var i=0;i<line.length;i++){
      var c=line[i];
      if(inQ){
        if(c==='"'&&line[i+1]==='"'){cur+='"';i++;}
        else if(c==='"'){inQ=false;}
        else cur+=c;
      } else {
        if(c==='"'){inQ=true;}
        else if(c===','){cols.push(cur);cur="";}
        else cur+=c;
      }
    }
    cols.push(cur);
    return cols;
  }

  var headers=parseRow(lines[0]);
  var col=function(name){return headers.indexOf(name);};
  var get=function(row,name){var i=col(name);return i>=0?(row[i]||""):"";};
  var bool=function(v){return v==="Yes"||v==="yes"||v==="1"||v==="true"||v==="Sent"||v==="sent";};
  // Normalise CSV call status abbreviations to CRM dropdown values
  var normCS=function(v){
    if(!v)return"";
    var m={"busy tone":"Busy Tone","callback req.":"Callback Requested","callback req":"Callback Requested",
           "switched off":"Switched Off","not reachable":"Not Reachable","called":"Called","not answered":"Not Answered","call not required":"Call Not Required"};
    return m[v.toLowerCase()]||v;
  };
  // Parse date strings like "11 March", "2nd March", "05 March" → "2026-03-11"
  var MONTHS={"january":1,"february":2,"march":3,"april":4,"may":5,"june":6,
              "july":7,"august":8,"september":9,"october":10,"november":11,"december":12,
              "jan":1,"feb":2,"mar":3,"apr":4,"jun":6,"jul":7,"aug":8,"sep":9,"oct":10,"nov":11,"dec":12};
  var parseDate=function(v){
    if(!v||v==="-")return"";
    // Already ISO
    if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
    // Strip ordinal suffixes: 2nd → 2, 3rd → 3
    var s=v.trim().replace(/(\d+)(st|nd|rd|th)/i,"$1");
    var parts=s.split(/[\s\/\-]+/);
    var day=null,month=null,year=new Date().getFullYear();
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      if(MONTHS[p.toLowerCase()]){month=MONTHS[p.toLowerCase()];}
      else if(/^\d{4}$/.test(p)){year=parseInt(p);}
      else if(/^\d{1,2}$/.test(p)){day=parseInt(p);}
    }
    if(!day||!month)return"";
    return year+"-"+(month<10?"0":"")+month+"-"+(day<10?"0":"")+day;
  };
  // Map CSV stage values → CRM stage keys
  var normStage=function(v,waS,niS){
    if(!v)return"outreach";
    var m={"wa sent":"outreach","whatsapp sent":"outreach","not interested":"outreach",
           "outreach":"outreach","first buzz":"first_buzz","first_buzz":"first_buzz",
           "counselling":"counselling","screening":"screening","admission":"admission","fee":"fee","fee done":"fee"};
    return m[v.toLowerCase()]||"outreach";
  };

  var imported=[];
  var importBase=Date.now();
  for(var r=1;r<lines.length;r++){
    var row=parseRow(lines[r]);
    if(row.every(function(c){return!c.trim();}))continue;
    var l={
      id:             importBase+r,
      bbkId:          get(row,"BBK ID")||get(row,"#"),
      parentName:     get(row,"Parent Name"),
      phone:          get(row,"Phone"),
      email:          get(row,"Email"),
      childName:      get(row,"Child Name"),
      childAge:       get(row,"Child Age"),
      program:        get(row,"Programme")||get(row,"Program"),
      interestLevel:  get(row,"Interest Level")==="Not Interested"?"Not Interested":(get(row,"Interest Level")||""),
      source:         get(row,"Source / Notes")||get(row,"Source")||get(row,"Reference"),
      stage:          normStage(get(row,"Stage")),
      remarks:        get(row,"Remarks"),
      lastTouched:    get(row,"Last Touched"),
      activityLog:    [],
      siblingIds:     [],
      firstBuzz:{
        done:         bool(get(row,"First Buzz Received")),
        childDOB:     parseDate(get(row,"Child DOB")),
        address:      get(row,"Address"),
        fatherName:   get(row,"Father Name")||get(row,"Parent Name"),
        motherName:   get(row,"Mother Name"),
        medicalNotes: get(row,"Medical Notes"),
        siblingName:  get(row,"Sibling Name"),
        siblingDOB:   parseDate(get(row,"Sibling DOB"))
      },
      outreach:{
        callStatus:         normCS(get(row,"📞 Call Status")||get(row,"Call Status")),
        callDone:           normCS(get(row,"📞 Call Status")||get(row,"Call Status"))==="Called",
        callDate:           parseDate(get(row,"Call Date")),
        callNotes:          get(row,"Remarks"),
        waSent:             bool(get(row,"WhatsApp Sent?"))||bool(get(row,"WA Sent"))||!!(get(row,"WA Sent Date")),
        waDate:             parseDate(get(row,"WA Sent Date")||get(row,"WA Date")),
        calendlyBooked:     bool(get(row,"Calendly Booked?")),
        visitDate:          parseDate(get(row,"Visit Date/Time")||get(row,"Visit Date")),
        visitTime:          "",
        visitBooked:        bool(get(row,"Calendly Booked?"))||bool(get(row,"Visit Done")),
        visitDone:          bool(get(row,"Visit Done")),
        visitNotes:         "",
        motherPhone:        "",
        reference:          "",
        prepSchoolMorning:  bool(get(row,"🏫 Prep School\n(Morning)"))||bool(get(row,"Prep School (Morning)")),
        activityCenterEvening: bool(get(row,"🎨 Activity Center\n(Evening)"))||bool(get(row,"Activity Center (Evening)")),
        summerCampInterest: false,
        followUpNeeded:     bool(get(row,"Follow-Up Needed?")),
        followUpDate:       parseDate(get(row,"Follow-Up Date")),
        admissionInterest:  get(row,"Admission Interest")
      },
      counselling:{
        done:         bool(get(row,"Counselling Done")),
        date:         get(row,"Counselling Date"),
        counsellorName:get(row,"Counsellor"),
        outcome:      get(row,"Outcome"),
        screeningDate:get(row,"Screening Date")
      },
      screening:{
        done:         bool(get(row,"Screening Done")),
        result:       get(row,"Screening Result"),
        examiner:     get(row,"Examiner"),
        scores:{
          "General Knowledge": get(row,"Score - General Knowledge"),
          "Gross Motor":       get(row,"Score - Gross Motor"),
          "Fine Motor":        get(row,"Score - Fine Motor"),
          "Language":          get(row,"Score - Language"),
          "Cognitive":         get(row,"Score - Cognitive"),
          "Number Concepts":   get(row,"Score - Number Concepts"),
          "Writing Skills":    get(row,"Score - Writing Skills"),
          "Visual Perception": get(row,"Score - Visual Perception"),
          "Pre-Writing":       get(row,"Score - Pre-Writing"),
          "Parental Input":    get(row,"Score - Parental Input")
        },
        qa:{}
      },
      admissionForm:{
        offerSent:      bool(get(row,"Offer Sent")),
        parentAccepted: bool(get(row,"Parents Accepted")),
        docsSubmitted:  bool(get(row,"Docs Submitted")),
        schoolConfirmed:bool(get(row,"School Confirmed"))
      },
      fee:{
        paymentPlan:  get(row,"Fee Plan"),
        amount:       get(row,"Total Fee"),
        amountPaid:   get(row,"Amount Paid"),
        paymentMode:  get(row,"Payment Mode"),
        receiptNo:    get(row,"Receipt No"),
        paymentDate:  get(row,"Payment Date")
      }
    };
    imported.push(l);
  }

  if(!imported.length){alert("No valid rows found in CSV.");return;}
  if(!confirm("Import "+imported.length+" leads from CSV? This will REPLACE your current data."))return;
  leads=imported;
  leadCounter=leads.length;
  lsSave();renderView();
  toast("Imported "+leads.length+" leads from CSV ✓");
}

var LOGIN_KEY="bbk_auth_v1";

function checkAuth(){
  try{
    var s=sessionStorage.getItem(LOGIN_KEY);
    return s==="1";
  }catch(e){return false;}
}
function doLogin(){
  var u=document.getElementById("l-user").value.trim();
  var p=document.getElementById("l-pass").value;
  var err=document.getElementById("l-err");
  if(u===CREDS.id&&p===CREDS.pw){
    try{sessionStorage.setItem(LOGIN_KEY,"1");}catch(e){}
    document.getElementById("login-screen").classList.add("hidden");
    err.classList.remove("show");
  } else {
    err.classList.add("show");
    document.getElementById("l-pass").value="";
    document.getElementById("l-pass").focus();
  }
}
function togglePw(){
  var inp=document.getElementById("l-pass");
  var eye=document.getElementById("pw-eye");
  if(inp.type==="password"){inp.type="text";eye.textContent="🙈";}
  else{inp.type="password";eye.textContent="👁";}
}
// Enter key submits
document.addEventListener("DOMContentLoaded",function(){
  ["l-user","l-pass"].forEach(function(id){
    var el2=document.getElementById(id);
    if(el2)el2.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

  // Show CRM or login
  if(checkAuth()){
