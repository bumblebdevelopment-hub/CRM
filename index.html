<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BumbleB Kidz — Admissions</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/*
  BumbleB Kidz CRM — v6
  Inspired by: Stripe Dashboard, Linear, Vercel
  Font: DM Sans — geometric, warm, precise
  Sidebar: #0A2540 (Stripe navy) — not black, not gray
  Accent: #F59E0B amber — one colour, used sparingly
  Icons: inline SVG only — no emoji in chrome
  Cards: row-based, data-first, generous whitespace
  Rule: if it doesn't carry meaning, remove it
*/

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* BumbleB Brand Palette — Premium Refresh */
  --honey:      #F5A800;
  --honey-deep: #C97800;
  --amber:      #E8920A;
  --cream:      #FAF5EA;
  --petal:      #FEF0D0;
  --charcoal:   #18161200;
  --ink:        #2D2A22;
  --muted:      #7C7361;
  --green:      #2DA870;  --green-bg:#EDFAF4; --green-b:#86DFBC;
  --red:        #D94545;  --red-bg:#FEF1F1;   --red-b:#F8AAAA;
  --blue:       #4A7FD4;  --blue-bg:#EEF5FF;  --blue-b:#94BEF8;

  /* Extended palette */
  --ink-0:   #FFFFFF;
  --ink-1:   #2D2A22;
  --ink-2:   #504C40;
  --ink-3:   #7C7361;
  --ink-4:   #A89D88;
  --ink-5:   #CFC4B0;

  --bg:      #F7F2E8;
  --surface: #FFFFFF;

  --line:    #E6DBCA;
  --line-s:  #F4EDD8;

  /* Sidebar — deep rich charcoal with warmth */
  --navy:    #171410;
  --navy-1:  #211E18;
  --navy-2:  #2E2B23;
  --navy-3:  #3D392F;
  --navy-t:  rgba(255,255,255,.05);
  --navy-t2: rgba(255,255,255,.09);
  --navy-txt: rgba(255,242,210,.45);
  --navy-txt-on: rgba(255,242,210,.92);

  --amber-h: #C97800;
  --amber-bg:#FEF4DC;
  --amber-b: #F0CA68;
  --amber-t: #5C3400;

  --violet:  #6D28D9;--violet-bg:#F5F2FF;--violet-b:#BBA8F8;
  --pink:    #C2185B;--pink-bg: #FDF0F6;--pink-b: #F4A0C8;
  --teal:    #0B857A;--teal-bg: #EDFCF9;--teal-b: #56D5C6;
  --orange:  #E8920A;--orange-bg:#FEF4DC;--orange-b:#F6CC78;

  --rail-w:  226px;
  --bar-h:   54px;

  --font-display: 'Fraunces', Georgia, serif;
  --font: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;

  --r-sm: 6px;
  --r-md: 9px;
  --r-lg: 11px;
  --r-xl: 14px;

  --shadow-card:   0 1px 2px rgba(0,0,0,.04), 0 4px 14px rgba(0,0,0,.05);
  --shadow-card-h: 0 2px 4px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.09);
  --shadow-modal:  0 24px 60px -8px rgba(0,0,0,.26), 0 0 0 1px rgba(0,0,0,.07);
  --shadow-hover:  0 4px 18px rgba(0,0,0,.09);
  --shadow-dropdown: 0 12px 32px rgba(0,0,0,.13), 0 0 0 1px rgba(0,0,0,.05);
  --honey-glow: 0 0 0 3px rgba(245,168,0,.18);
}

html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;display:flex;font-size:15px}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
::-webkit-scrollbar-track{background:transparent}

/* ── SVG ICON SYSTEM ─────────────────── */
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{display:block}

/* ── SIDEBAR / RAIL ─────────────────── */
#rail{
  width:var(--rail-w);min-width:var(--rail-w);
  height:100vh;
  background:linear-gradient(175deg,#1D1A14 0%,#161310 55%,#131109 100%);
  display:flex;flex-direction:column;
  overflow:hidden;flex-shrink:0;
  border-right:1px solid rgba(255,255,255,.025);
  box-shadow:2px 0 28px rgba(0,0,0,.28);
  transition:transform .22s cubic-bezier(.4,0,.2,1),width .22s cubic-bezier(.4,0,.2,1),min-width .22s cubic-bezier(.4,0,.2,1);
}
#rail.collapsed{
  transform:translateX(calc(-1 * var(--rail-w)));
  width:0;min-width:0;
  border-right:none;
}
/* Overlay behind rail on mobile when open */
#rail-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;
}
#rail-overlay.show{display:block}

/* Toggle button — always visible */
#rail-toggle{
  position:fixed;left:0;top:50%;transform:translateY(-50%);
  width:20px;height:52px;
  background:var(--navy);border:none;border-radius:0 8px 8px 0;
  cursor:pointer;z-index:300;
  display:flex;align-items:center;justify-content:center;
  transition:left .22s cubic-bezier(.4,0,.2,1),background .15s;
  box-shadow:2px 0 8px rgba(0,0,0,.18);
}
#rail-toggle:hover{background:var(--amber);width:22px;}
#rail-toggle svg{transition:transform .2s}
body.rail-open #rail-toggle{left:var(--rail-w)}
body.rail-open #rail-toggle svg{transform:scaleX(-1)}

.rail-top{
  height:var(--bar-h);display:flex;align-items:center;
  padding:0 16px;gap:11px;
  border-bottom:1px solid rgba(255,255,255,.055);
  flex-shrink:0;
  background:rgba(255,255,255,.015);
}
.rail-bee{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#F5A800 0%,#E07800 100%);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:17px;line-height:1;
  box-shadow:0 2px 8px rgba(245,168,0,.35), 0 0 0 1px rgba(245,168,0,.2);
}
.rail-brand{display:flex;flex-direction:column;gap:1px}
.rail-brand-name{font-size:14px;font-weight:700;color:#FFF8E8;letter-spacing:-.3px;font-family:var(--font-display)}
.rail-brand-sub{font-size:9px;font-weight:600;color:rgba(255,242,210,.38);letter-spacing:.7px;text-transform:uppercase}

.rail-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 0}
.rail-body::-webkit-scrollbar{width:3px}
.rail-body::-webkit-scrollbar-thumb{background:var(--navy-t2)}

.rail-label{
  font-size:9px;font-weight:700;color:rgba(255,242,210,.28);
  letter-spacing:1px;text-transform:uppercase;
  padding:18px 16px 5px;
}
.rail-link{
  display:flex;align-items:center;gap:9px;
  padding:7.5px 12px;margin:1px 8px;
  border-radius:7px;font-size:12.5px;font-weight:500;
  color:rgba(255,242,210,.48);cursor:pointer;
  border:none;background:transparent;
  width:calc(100% - 16px);text-align:left;
  transition:background .15s,color .15s,box-shadow .15s;white-space:nowrap;
}
.rail-link:hover{
  background:rgba(255,255,255,.07);
  color:rgba(255,242,210,.88);
}
.rail-link.on{
  background:linear-gradient(135deg,rgba(245,168,0,.18) 0%,rgba(245,168,0,.1) 100%);
  color:#F5C842;
  font-weight:700;
  box-shadow:inset 0 0 0 1px rgba(245,168,0,.18);
}
.rail-link.on .rail-badge{color:rgba(245,168,0,.6)}
.rail-link-lbl{flex:1}
.rail-badge{
  font-size:10px;font-weight:600;
  color:rgba(255,255,255,.3);
  min-width:16px;text-align:right;
}
.rail-sep{height:1px;background:rgba(255,255,255,.045);margin:8px 14px}

.rail-foot{
  border-top:1px solid rgba(255,255,255,.07);
  padding:8px;flex-shrink:0;
}

/* ── MAIN ────────────────────────────── */
#main{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Topbar */
#bar{
  height:var(--bar-h);
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 22px;gap:12px;flex-shrink:0;
  box-shadow:0 1px 0 rgba(0,0,0,.04);
}
.bar-title{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;font-family:var(--font-display);letter-spacing:-.2px}
.bar-slash{color:var(--line);font-size:15px;font-weight:300}
.bar-sub{font-size:12.5px;color:var(--ink-3);font-weight:500}

.search{flex:1;max-width:340px;position:relative}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--ink-4);
}
#search{
  width:100%;background:var(--bg);
  border:1px solid var(--line);border-radius:var(--r-lg);
  padding:7px 10px 7px 33px;
  font-size:13px;font-weight:400;color:var(--ink-1);
  outline:none;transition:border-color .15s,box-shadow .15s,background .12s;
}
#search::placeholder{color:var(--ink-4)}
#search:focus{background:#fff;border-color:var(--honey);box-shadow:var(--honey-glow)}

.bar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.lcount{font-size:11.5px;font-weight:500;color:var(--ink-4);white-space:nowrap}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:12px;font-weight:600;line-height:1;
  padding:7px 13px;border-radius:var(--r-md);
  cursor:pointer;border:none;transition:all .14s;white-space:nowrap;
}
.btn-ghost{
  background:transparent;border:1px solid var(--line);color:var(--ink-2);
}
.btn-ghost:hover{background:var(--bg);border-color:var(--ink-5);color:var(--ink-1);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.btn-cta{
  background:linear-gradient(145deg,#F5B020 0%,#E08A00 100%);
  color:#fff;font-weight:700;
  border:1px solid rgba(0,0,0,.1);
  letter-spacing:-.1px;
  box-shadow:0 1px 3px rgba(200,110,0,.3), 0 2px 8px rgba(200,110,0,.18);
}
.btn-cta:hover{
  background:linear-gradient(145deg,#FFBA2A 0%,#E89200 100%);
  box-shadow:0 2px 6px rgba(200,110,0,.35), 0 4px 14px rgba(200,110,0,.22);
  transform:translateY(-1px);
}

/* ── FILTER STRIP ────────────────────── */
#strip{
  height:42px;
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
  display:flex;align-items:center;
  padding:0 22px;gap:1px;
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#strip::-webkit-scrollbar{display:none}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:4px 11px;border-radius:6px;
  font-size:12px;font-weight:500;
  cursor:pointer;border:none;
  background:transparent;color:var(--ink-3);
  transition:all .14s;white-space:nowrap;flex-shrink:0;
}
.chip:hover{background:var(--petal);color:var(--ink)}
.chip.on{
  background:linear-gradient(135deg,#F5B020 0%,#E08A00 100%);
  color:#fff;font-weight:700;
  box-shadow:0 1px 4px rgba(200,100,0,.25);
}
.chip-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.chip-sep{width:1px;height:14px;background:var(--line);margin:0 4px;flex-shrink:0}

/* ── CONTENT ─────────────────────────── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px;background:var(--cream)}
#view-leads,#view-pipeline,#view-dashboard,#view-table,#view-today,#view-outstanding{display:none}

/* ── LEADS LIST ──────────────────────── */
.list-group{margin-bottom:22px}
.list-group-head{
  display:flex;align-items:center;gap:8px;
  font-size:10px;font-weight:700;color:var(--ink-4);
  letter-spacing:.9px;text-transform:uppercase;
  margin-bottom:6px;padding:0 2px;
}
.list-group-n{
  font-size:10px;font-weight:600;color:var(--ink-4);
  background:var(--bg);border:1px solid var(--line);
  padding:1px 7px;border-radius:99px;
}

/* ── LEAD ROW CARD ───────────────────── */
.lead-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-left:3px solid var(--line);
  border-radius:var(--r-xl);
  padding:12px 14px 11px;
  margin-bottom:6px;
  cursor:pointer;
  transition:border-color .15s,box-shadow .18s,transform .15s;
  box-shadow:var(--shadow-card);
  animation:cardIn .22s ease both;
}
.lead-card:hover{
  border-top-color:var(--ink-5);
  border-right-color:var(--ink-5);
  border-bottom-color:var(--ink-5);
  box-shadow:var(--shadow-card-h);
  transform:translateY(-1px);
}
@keyframes cardIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.lead-card:nth-child(1){animation-delay:.02s}
.lead-card:nth-child(2){animation-delay:.04s}
.lead-card:nth-child(3){animation-delay:.06s}
.lead-card:nth-child(4){animation-delay:.08s}
.lead-card:nth-child(5){animation-delay:.10s}
.lead-card:nth-child(6){animation-delay:.12s}

/* Row 1: avatar + names block */
.card-r1{display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
/* Row 2: pills */
.card-r2{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
/* Row 3: progress rail */
.card-rail{display:flex;align-items:center;margin-bottom:7px}
/* Row 4: stage + id bar */
.card-r3{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:8px;border-top:1px solid var(--line-s);
}

.av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
  letter-spacing:-.3px;
  box-shadow:0 1px 4px rgba(0,0,0,.18);
}
.card-info{flex:1;min-width:0;overflow:hidden}
.card-name{font-size:13.5px;font-weight:700;color:var(--ink-1);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:11.5px;color:var(--ink-3);margin-top:2px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-ib{flex-shrink:0;margin-top:1px}

.card-id{
  font-size:9.5px;font-weight:600;letter-spacing:.3px;
  color:var(--ink-4);background:var(--bg);
  border:1px solid var(--line);border-radius:5px;
  padding:2px 7px;font-variant-numeric:tabular-nums;
  font-family:ui-monospace, monospace;
}
.pill{
  display:inline-flex;align-items:center;
  border-radius:5px;padding:2px 8px;
  font-size:10px;font-weight:600;
  border:1px solid transparent;white-space:nowrap;
  letter-spacing:-.05px;
}
.card-stage{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:var(--ink-3)}
.card-stage-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-remarks{font-size:10.5px;color:var(--ink-4);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Progress dots */
.prog{display:flex;align-items:center}
.pd{
  width:16px;height:16px;border-radius:50%;border:1.5px solid;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;flex-shrink:0;transition:all .18s;
}
.pl{flex:1;height:1px;max-width:16px}

/* ── PIPELINE ────────────────────────── */
#pipeline-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;align-items:flex-start}
.stage-col{min-width:234px;max-width:234px;flex-shrink:0}
.stage-head{
  display:flex;align-items:center;gap:8px;
  padding:10px 13px;margin-bottom:8px;
  border-radius:var(--r-xl);background:var(--surface);
  border:1px solid var(--line);
  box-shadow:var(--shadow-card);
}
.stage-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.stage-name{font-size:12px;font-weight:700;color:var(--ink-2);flex:1;letter-spacing:-.1px}
.stage-n{font-size:11px;font-weight:700;padding:1px 8px;border-radius:99px}
.stage-empty{
  height:58px;border-radius:var(--r-xl);
  border:1.5px dashed var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--ink-4);font-weight:400;
}

/* ── DASHBOARD ───────────────────────── */
/* Summary strip */
.d-strip{
  background:linear-gradient(135deg,#1E1B14 0%,#161310 100%);
  border-radius:16px;
  padding:22px 26px;margin-bottom:16px;
  display:grid;grid-template-columns:repeat(6,1fr);gap:0;
  box-shadow:0 4px 24px rgba(0,0,0,.18), 0 0 0 1px rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.d-strip::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,168,0,.3),transparent);
}
.d-strip-item{
  padding:0 20px;border-right:1px solid rgba(255,242,210,.09);
}
.d-strip-item:first-child{padding-left:0}
.d-strip-item:last-child{border-right:none}
.d-strip-lbl{font-size:9.5px;font-weight:600;color:rgba(255,242,210,.42);letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px}
.d-strip-n{font-size:28px;font-weight:800;color:#FFFBF0;letter-spacing:-1.2px;line-height:1;font-family:var(--font-display)}
.d-strip-sub{font-size:10.5px;color:rgba(255,242,210,.38);margin-top:5px}
.d-strip-cta{
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,#F5B020 0%,#E08000 100%);
  color:#fff;
  border:none;border-radius:8px;cursor:pointer;
  font-size:11px;font-weight:700;padding:7px 14px;
  margin-top:11px;width:fit-content;transition:all .15s;
  font-family:var(--font);
  box-shadow:0 2px 8px rgba(200,100,0,.3);
}
.d-strip-cta:hover{background:linear-gradient(135deg,#FFBA2A 0%,#E88E00 100%);transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,100,0,.38)}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.kpi{
  background:var(--surface);border:1px solid var(--line);
  border-radius:16px;padding:20px 22px;
  transition:box-shadow .15s,transform .15s,border-color .15s;
  position:relative;overflow:hidden;
}
.kpi::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--honey),var(--amber));
  opacity:0;transition:opacity .2s;
}
.kpi:hover{box-shadow:0 6px 24px rgba(58,53,38,.1);transform:translateY(-2px);border-color:var(--ink-5)}
.kpi:hover::after{opacity:1}
.kpi-l{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.4px;text-transform:uppercase}
.kpi-n{font-size:36px;font-weight:800;color:var(--ink);letter-spacing:-1.5px;line-height:1;font-family:var(--font-display)}
.kpi-s{font-size:11px;color:var(--muted);margin-top:7px;font-weight:400}
.kpi-breakdown{margin-top:11px;display:flex;flex-wrap:wrap;gap:4px}
.kpi-chip{font-size:10px;font-weight:600;padding:2px 9px;border-radius:99px;background:var(--petal);color:var(--ink-2);border:1px solid var(--line)}

/* Main grid */
.dash-row{display:grid;grid-template-columns:1.4fr 1fr;gap:12px;margin-bottom:14px}
.d-panel{
  background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px;
  box-shadow:var(--shadow-card);
}
.d-panel-title{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:16px;letter-spacing:-.15px;font-family:var(--font-display)}
.d-panel-sub{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px}

/* Bee Journey Funnel */
.f-row{margin-bottom:10px}
.f-row:last-child{margin-bottom:0}
.f-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.f-left{display:flex;align-items:center;gap:8px}
.f-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.f-name{font-size:12px;font-weight:600;color:var(--ink-2)}
.f-num{font-size:12px;font-weight:700;color:var(--ink)}
.f-track{height:5px;background:var(--cream);border-radius:99px;overflow:hidden}
.f-fill{height:100%;border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Interest split */
.interest-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
.int-card{background:var(--cream);border-radius:10px;padding:12px 14px;text-align:center}
.int-emoji{font-size:18px;margin-bottom:4px}
.int-n{font-size:22px;font-weight:800;color:var(--ink);font-family:var(--font-display);letter-spacing:-.5px}
.int-lbl{font-size:10px;font-weight:600;color:var(--muted);margin-top:2px}

/* Today's Actions panel */
.action-item{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 0;border-bottom:1px solid var(--line-s);
}
.action-item:last-child{border-bottom:none}
.action-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.action-body{flex:1;min-width:0}
.action-name{font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.action-meta{font-size:11px;color:var(--muted);margin-top:2px}
.action-badge{font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:99px;flex-shrink:0}
.action-done-btn{
  background:none;border:1px solid var(--line);border-radius:6px;
  padding:3px 8px;font-size:10px;font-weight:600;color:var(--muted);
  cursor:pointer;transition:all .12s;flex-shrink:0;font-family:var(--font);
}
.action-done-btn:hover{background:var(--green);color:#fff;border-color:var(--green)}
.actions-empty{text-align:center;padding:28px 0;color:var(--muted);font-size:12px}

/* Hive Seats */
.seats-full-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.seat-card{
  background:var(--surface);border:1px solid var(--line);border-radius:14px;
  padding:16px 18px;position:relative;overflow:hidden;
  box-shadow:var(--shadow-card);
  transition:box-shadow .15s,transform .15s;
}
.seat-card:hover{box-shadow:var(--shadow-card-h);transform:translateY(-1px)}
.seat-card.warn{border-color:rgba(232,146,10,.35);background:rgba(254,244,220,.5)}
.seat-prog{font-size:11.5px;font-weight:700;color:var(--ink);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.seat-age{font-size:9.5px;color:var(--muted);margin-bottom:10px}
.seat-nums{display:flex;align-items:baseline;gap:3px;margin-bottom:6px}
.seat-filled{font-size:26px;font-weight:800;letter-spacing:-1px;font-family:var(--font-display)}
.seat-total{font-size:12px;color:var(--muted);font-weight:500}
.seat-bar-wrap{height:4px;background:var(--cream);border-radius:99px;overflow:hidden}
.seat-bar{height:100%;border-radius:99px;transition:width .5s}
.seat-warn-badge{
  position:absolute;top:10px;right:10px;
  background:#FF8C00;color:#fff;
  font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:99px;
}

/* Dashboard bottom table */
.dash-table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px}
.dash-table-head{
  padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--line);
}
.dash-table-title{font-size:13px;font-weight:700;color:var(--ink);font-family:var(--font-display)}
.dash-table-scroll{overflow-x:auto}
.dash-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.dash-tbl th{
  background:var(--cream);font-size:10px;font-weight:700;
  padding:9px 14px;text-align:left;white-space:nowrap;
  border-bottom:1px solid var(--line);
  color:var(--muted);text-transform:uppercase;letter-spacing:.5px;
}
.dash-tbl td{
  padding:10px 14px;border-bottom:1px solid var(--line-s);
  vertical-align:middle;white-space:nowrap;
  font-weight:400;color:var(--ink-2);
}
.dash-tbl tr:last-child td{border-bottom:none}
.dash-tbl tr:hover td{background:var(--petal);cursor:pointer;color:var(--ink)}
.score-bar-wrap{width:60px;height:5px;background:var(--cream);border-radius:99px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:5px}
.score-bar-fill{height:100%;border-radius:99px}
.d-action-btn{
  background:none;border:1px solid var(--line);border-radius:6px;
  padding:4px 8px;font-size:11px;cursor:pointer;
  transition:all .12s;font-family:var(--font);color:var(--ink-2);
}
.d-action-btn:hover{background:var(--petal);border-color:var(--honey)}

/* ── TABLE ───────────────────────────── */
.t-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden}
.t-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{
  background:var(--bg);font-size:10px;font-weight:700;
  padding:9px 14px;text-align:left;white-space:nowrap;
  border-bottom:1px solid var(--line);
  color:var(--ink-4);text-transform:uppercase;letter-spacing:.6px;
}
td{
  padding:10px 14px;border-bottom:1px solid var(--line-s);
  vertical-align:middle;white-space:nowrap;
  font-weight:400;color:var(--ink-2);
}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg);cursor:pointer;color:var(--ink-1)}
.ty{color:var(--green);font-weight:700}
.tn{color:var(--ink-5);font-weight:500}

/* ── MODAL ───────────────────────────── */
#modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(10,8,4,.5);
  z-index:200;align-items:center;justify-content:center;
  padding:24px;backdrop-filter:blur(6px);
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--surface);border-radius:16px;
  width:100%;max-width:700px;max-height:92vh;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:var(--shadow-modal);
  border:1px solid rgba(255,255,255,.08);
  animation:mIn .2s cubic-bezier(.16,1,.3,1) both;
}
@keyframes mIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}
.drag-pill{display:none}

#mh{
  padding:18px 20px 0;flex-shrink:0;
  background:linear-gradient(180deg,var(--cream) 0%,#fff 100%);
}
.mh-r1{
  display:flex;align-items:center;gap:13px;
  padding-bottom:15px;border-bottom:1px solid var(--line);
}
.mh-av{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.mh-info{flex:1;min-width:0}
.mh-name{font-size:17px;font-weight:800;color:var(--ink-1);letter-spacing:-.4px}
.mh-sub{font-size:13px;color:var(--ink-3);margin-top:2px;font-weight:400}
.mh-bbk{
  font-size:10px;font-weight:600;color:var(--ink-4);
  background:var(--bg);border:1px solid var(--line);
  padding:2px 9px;border-radius:5px;
  display:inline-block;margin-top:4px;
  letter-spacing:.3px;font-family:ui-monospace,monospace;
}
#mh-close{
  width:30px;height:30px;border-radius:7px;
  background:var(--bg);border:1px solid var(--line);
  color:var(--ink-3);cursor:pointer;font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .12s;flex-shrink:0;
}
#mh-close:hover{background:var(--line);color:var(--ink-1)}

/* ── UNIFIED STEPPER ─────────────────── */
#stepper{
  display:flex;align-items:flex-start;
  padding:14px 8px 4px;overflow:visible;
}
.sn-wrap{
  display:flex;flex-direction:column;align-items:center;
  gap:6px;flex-shrink:0;min-width:58px;
}
.sn{
  width:30px;height:30px;border-radius:50%;border:none;
  cursor:pointer;font-size:12px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;
}
.sn-lbl{
  font-size:10px;font-weight:600;color:#94A3B8;
  white-space:nowrap;text-align:center;
  transition:color .15s;line-height:1.2;
}
.sn-lbl.on{color:var(--amber-t);font-weight:700}
.sl{flex:1;height:2px;max-width:36px;margin-top:15px;flex-shrink:1}

#mq{
  display:flex;gap:8px;flex-wrap:wrap;
  padding:10px 18px;
  background:var(--bg);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.qf{display:flex;flex-direction:column;gap:3px;flex:1;min-width:100px}
.ql{font-size:11px;font-weight:700;color:var(--ink-4);text-transform:uppercase;letter-spacing:.6px}
.qs,.qi{
  border:1px solid var(--line);border-radius:6px;
  padding:7px 11px;font-size:14px;font-weight:400;
  color:var(--ink-1);background:var(--surface);outline:none;
  transition:border-color .12s,box-shadow .12s;
}
.qs:focus,.qi:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.1)}

#atabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  background:var(--surface);border-bottom:1px solid var(--line);
  flex-shrink:0;padding:0 20px;
  background:linear-gradient(180deg,#fff 0%,#fdfbf7 100%);
}
#atabs::-webkit-scrollbar{display:none}
.atab{
  border:none;background:transparent;
  padding:11px 14px;font-size:12.5px;font-weight:500;
  cursor:pointer;white-space:nowrap;
  border-bottom:2px solid transparent;
  color:var(--ink-3);transition:color .12s;flex-shrink:0;
}
.atab:hover{color:var(--ink-1)}
.atab.on{border-bottom-color:var(--honey);color:var(--ink-1);font-weight:700}
.atab-locked{opacity:.42;cursor:not-allowed !important;pointer-events:auto}
.atab-done{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;border-radius:50%;
  color:#fff;font-size:7.5px;font-weight:700;
  margin-left:4px;vertical-align:middle;
}

#mpanel{flex:1;overflow-y:auto;padding:18px 20px 10px}
#mfooter{
  display:flex;gap:8px;padding:14px 20px;
  border-top:1px solid var(--line);flex-shrink:0;
  background:linear-gradient(180deg,#fdfbf7 0%,var(--cream) 100%);
}
#save-btn{
  flex:1;
  background:linear-gradient(145deg,#F5B020 0%,#E08000 100%);
  border:1px solid rgba(0,0,0,.08);
  border-radius:var(--r-md);color:#fff;font-weight:700;
  font-size:14px;padding:12px;cursor:pointer;
  transition:all .14s;
  box-shadow:0 2px 8px rgba(200,100,0,.25);
}
#save-btn:hover{
  background:linear-gradient(145deg,#FFBA2A 0%,#E89200 100%);
  box-shadow:0 4px 14px rgba(200,100,0,.32);
  transform:translateY(-1px);
}
#cancel-btn{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-md);color:var(--ink-2);
  font-weight:500;font-size:14px;
  padding:12px 18px;cursor:pointer;transition:all .12s;
}
#cancel-btn:hover{background:var(--bg);border-color:var(--ink-5)}
#delete-btn{
  background:var(--surface);border:1px solid var(--red-b);
  border-radius:var(--r-md);color:var(--red);
  font-weight:600;font-size:14px;
  padding:12px 16px;cursor:pointer;transition:all .12s;
  display:flex;align-items:center;gap:6px;
}
#delete-btn:hover{background:var(--red-bg);box-shadow:0 2px 8px rgba(200,50,50,.15)}


/* ── FORM ────────────────────────────── */
.sh{
  font-size:10px;font-weight:700;color:var(--ink-3);
  margin:18px 0 10px;padding-bottom:9px;
  border-bottom:1px solid var(--line);
  text-transform:uppercase;letter-spacing:.9px;
  display:flex;align-items:center;gap:8px;
}
.sh::before{content:'';display:inline-block;width:3px;height:11px;border-radius:2px;background:linear-gradient(180deg,var(--honey),var(--amber));flex-shrink:0}
.sh:first-child{margin-top:0}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--ink-3);margin-bottom:5px;letter-spacing:.2px;text-transform:uppercase}
.fld input,.fld select,.fld textarea{
  width:100%;border:1px solid var(--line);border-radius:var(--r-md);
  padding:9px 12px;font-size:13.5px;font-weight:400;
  color:var(--ink-1);background:var(--surface);outline:none;
  transition:border-color .14s,box-shadow .14s,background .1s;
}
.fld input:focus,.fld select:focus,.fld textarea:focus{
  border-color:var(--honey);box-shadow:var(--honey-glow);
  background:#FFFEF9;
}
.fld textarea{resize:vertical;min-height:72px;line-height:1.65}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ckl{
  display:flex;align-items:center;gap:10px;padding:9px 12px;
  border-radius:var(--r-md);border:1px solid var(--line);
  cursor:pointer;margin-bottom:6px;
  font-size:12.5px;font-weight:400;color:var(--ink-2);
  transition:all .14s;user-select:none;
}
.ckl input[type=checkbox]{width:14px;height:14px;accent-color:var(--honey);flex-shrink:0}
.ckl.on{border-color:var(--amber-b);background:var(--amber-bg);color:var(--amber-t)}
.tick-done{
  background:var(--green-bg);color:var(--green);font-weight:600;
  font-size:12px;padding:9px 12px;border-radius:var(--r-md);
  margin-bottom:7px;border:1px solid var(--green-b);
}
.gate{border-radius:var(--r-md);padding:10px 13px;font-size:12px;font-weight:600;margin-top:10px;text-align:center}
.gate.rdy{background:var(--green-bg);color:var(--green);border:1px solid var(--green-b)}
.gate.lck{background:var(--bg);color:var(--ink-4);border:1px solid var(--line)}
.rbox{border-radius:var(--r-md);padding:11px 13px;margin-bottom:8px;font-size:12.5px;font-weight:400}
.info-box{border-radius:var(--r-md);padding:10px 13px;font-size:12px;font-weight:500;background:var(--amber-bg);border:1px solid var(--amber-b);color:var(--amber-t);margin-bottom:10px}

/* Calendar */
.cal-wrap{border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden;margin-bottom:10px;background:var(--surface)}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--line)}
.cal-hd-title{font-size:12.5px;font-weight:700;color:var(--ink-1)}
.cal-nav{background:var(--surface);border:1px solid var(--line);border-radius:5px;width:26px;height:26px;cursor:pointer;font-size:12px;color:var(--ink-3);transition:all .12s;display:flex;align-items:center;justify-content:center}
.cal-nav:hover{border-color:var(--amber);color:var(--amber-t)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:8px}
.cal-dow{text-align:center;font-size:8.5px;font-weight:700;color:var(--ink-4);padding:3px 0;text-transform:uppercase;letter-spacing:.4px}
.cal-day{text-align:center;font-size:11.5px;font-weight:400;padding:6px 2px;border-radius:5px;cursor:pointer;color:var(--ink-2);transition:all .1s}
.cal-day:hover:not(.cal-other):not(.cal-past):not(.cal-weekend){background:var(--bg)}
.cal-day.cal-today{background:var(--amber-bg);color:var(--amber-t);font-weight:700}
.cal-day.cal-selected{background:var(--amber);color:#fff;font-weight:700}
.cal-day.cal-other,.cal-day.cal-past{color:var(--ink-5);cursor:default;opacity:.5}
.cal-day.cal-weekend{opacity:.3;cursor:default}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:10px}
.slot-btn{border:1px solid var(--line);border-radius:6px;padding:7px 4px;font-size:11px;font-weight:500;cursor:pointer;background:var(--surface);color:var(--ink-2);transition:all .12s;text-align:center}
.slot-btn:hover{border-color:var(--amber);color:var(--amber-t)}
.slot-btn.sel{border-color:var(--amber);background:var(--amber);color:#fff;font-weight:700}
.booked-slot{background:var(--green-bg);border-radius:var(--r-md);padding:9px 12px;font-weight:600;font-size:12.5px;color:var(--green);display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;border:1px solid var(--green-b)}
.booked-slot button{background:var(--surface);border:1px solid var(--green-b);border-radius:5px;padding:3px 9px;font-size:11px;font-weight:600;color:var(--green);cursor:pointer;transition:all .12s}

/* Docs */
.docs-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.doc-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:var(--r-md);border:1px solid var(--line);cursor:pointer;font-size:12px;font-weight:400;color:var(--ink-2);transition:all .12s;user-select:none}
.doc-item.done{border-color:var(--green-b);background:var(--green-bg);color:var(--green)}
.doc-item input[type=checkbox]{width:13px;height:13px;accent-color:var(--green);flex-shrink:0}
.doc-item .doc-icon{font-size:14px;flex-shrink:0}
.doc-progress{height:4px;background:var(--bg);border-radius:99px;overflow:hidden;margin-bottom:10px;border:1px solid var(--line)}
.doc-progress-bar{height:100%;background:var(--green);border-radius:99px;transition:width .4s ease}

/* Receipt */
.receipt-box{border:1px solid var(--amber-b);border-radius:var(--r-xl);padding:16px;margin-top:12px;background:var(--amber-bg)}
.receipt-title{font-size:13px;font-weight:700;color:var(--amber-t);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.receipt-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--amber-b);font-size:12px}
.receipt-row:last-child{border-bottom:none}
.receipt-label{color:var(--amber-t);opacity:.75;font-weight:400}
.receipt-val{font-weight:700;color:var(--amber-t)}
.receipt-total{background:var(--amber);border-radius:var(--r-md);padding:10px 13px;margin-top:10px;display:flex;justify-content:space-between;font-weight:800;font-size:13.5px;color:#fff}
.btn-download{width:100%;background:var(--ink-1);color:#fff;border:none;border-radius:var(--r-md);padding:10px;font-weight:700;font-size:12px;cursor:pointer;margin-top:9px;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .12s}
.btn-download:hover{background:var(--ink-2)}

/* Script modal */
#soverlay{display:none;position:fixed;inset:0;background:rgba(10,37,64,.4);z-index:300;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
#soverlay.open{display:flex}
#sbox{background:var(--surface);border-radius:14px;border:1px solid var(--line);width:100%;max-width:460px;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-modal);animation:mIn .18s cubic-bezier(.16,1,.3,1) both}
.s-title{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700;color:var(--ink-1);flex-shrink:0}
#s-close{width:27px;height:27px;border-radius:5px;background:var(--bg);border:1px solid var(--line);color:var(--ink-3);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .12s}
#s-close:hover{background:var(--line);color:var(--ink-1)}
.s-tabs{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid var(--line);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.s-tabs::-webkit-scrollbar{display:none}
.s-tab{border:1px solid var(--line);background:transparent;color:var(--ink-3);font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;cursor:pointer;white-space:nowrap;transition:all .12s}
.s-tab.on{border-color:var(--amber-b);background:var(--amber-bg);color:var(--amber-t);font-weight:600}
#s-pre{flex:1;overflow-y:auto;padding:14px 16px;color:var(--ink-2);font-size:12px;line-height:1.75;white-space:pre-wrap}
.s-footer{padding:10px 12px;border-top:1px solid var(--line);display:flex;gap:6px;flex-shrink:0}
#copy-btn{flex:1;background:var(--amber);border:none;border-radius:var(--r-md);color:#fff;font-weight:700;font-size:12.5px;padding:9px;cursor:pointer;transition:background .12s}
#copy-btn:hover{background:var(--amber-h)}
#copy-btn.cpd{background:var(--green)}

/* Sync status indicator */
#sync-status{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;font-weight:600;padding:4px 9px;
  border-radius:99px;border:1px solid var(--line);
  color:var(--ink-4);background:var(--bg);white-space:nowrap;
  transition:all .3s;
}
#sync-status.synced{color:var(--green);border-color:var(--green-b);background:var(--green-bg)}
#sync-status.saving{color:var(--amber-t);border-color:var(--amber-b);background:var(--amber-bg)}
#sync-status.error{color:var(--red);border-color:var(--red-b);background:var(--red-bg)}
#sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}



/* Toast */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--ink-1);color:#fff;
  font-weight:600;font-size:12.5px;
  padding:9px 20px;border-radius:99px;
  opacity:0;transition:all .22s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:400;white-space:nowrap;
  box-shadow:var(--shadow-dropdown);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media print{body>*:not(#print-area){display:none!important}#print-area{display:block!important}}
#print-area{display:none}

@media(max-width:768px){
  #rail{display:none}
  #modal-overlay{padding:0;align-items:flex-end}
  #modal{border-radius:16px 16px 0 0;max-width:100%;max-height:92vh}
  .drag-pill{display:block;padding:8px;text-align:center}
  .drag-pill span{display:inline-block;width:32px;height:3px;background:var(--line);border-radius:99px}
  .kpi-row{grid-template-columns:1fr 1fr}
  .dash-row{grid-template-columns:1fr}
  .d-strip{grid-template-columns:1fr 1fr;gap:12px}
  .d-strip-item{padding:8px 0;border-right:none;border-bottom:1px solid rgba(255,245,220,.12)}
  .seats-full-row{grid-template-columns:1fr 1fr}
  #content{padding:14px}
}


/* ── DISCOVERY FLIGHT DETAIL FORM ─────────────── */
.sc-section{margin-bottom:14px}
.sc-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:7px;background:#F8FAFC;border:1px solid #E2E8F0;margin-bottom:5px;gap:8px}
.sc-row:hover{background:#F1F5F9}
.sc-lbl{font-size:13.5px;font-weight:500;color:#0F172A;flex:1;line-height:1.4}
.sc-btns{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.sc-btn{padding:5px 12px;border-radius:5px;border:1.5px solid #E2E8F0;background:#fff;font-size:12.5px;font-weight:600;color:#64748B;cursor:pointer;transition:all .12s;white-space:nowrap}
.sc-btn:hover{border-color:#94A3B8;color:#334155}
.sc-btn.sc-active{box-shadow:inset 0 0 0 1px currentColor}
.sc-info{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:9px 13px;font-size:12px;color:#1D4ED8;font-weight:600;margin-bottom:12px}
.sc-decision{display:flex;align-items:center;gap:12px;padding:12px;background:#F1F5F9;border-radius:8px;margin-top:4px}
.sc-ready-yes{background:#ECFDF5!important;color:#059669!important;border-color:#059669!important;font-size:14px!important;padding:8px 22px!important;font-weight:700!important}
.sc-ready-no{background:#FEF2F2!important;color:#DC2626!important;border-color:#DC2626!important;font-size:14px!important;padding:8px 22px!important;font-weight:700!important}

/* ── TODAY VIEW ───────────────────────────────────────────────── */
.today-section{margin-bottom:20px}
.today-section-head{
  display:flex;align-items:center;gap:8px;
  font-size:10px;font-weight:700;color:var(--ink-4);
  letter-spacing:.9px;text-transform:uppercase;
  margin-bottom:8px;padding:0 2px;
}
.today-section-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.today-section-n{font-size:10px;font-weight:600;color:var(--ink-4);background:var(--bg);border:1px solid var(--line);padding:1px 7px;border-radius:99px}
.action-row{
  display:flex;align-items:center;gap:12px;
  background:var(--surface);border:1px solid var(--line);
  border-left:3px solid var(--line);border-radius:var(--r-lg);
  padding:12px 14px;margin-bottom:5px;cursor:pointer;
  transition:box-shadow .12s,border-color .12s;
  animation:cardIn .2s ease both;
}
.action-row:hover{box-shadow:var(--shadow-hover);border-right-color:var(--ink-5);border-top-color:var(--ink-5);border-bottom-color:var(--ink-5)}
.action-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.action-info{flex:1;min-width:0}
.action-name{font-size:13px;font-weight:700;color:var(--ink-1);letter-spacing:-.1px}
.action-detail{font-size:11.5px;color:var(--ink-3);margin-top:2px}
.action-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.action-time{font-size:11px;font-weight:600;color:var(--ink-3)}
.action-urgent{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.today-empty{
  text-align:center;padding:48px 24px;
  color:var(--ink-4);font-size:13px;font-weight:500;
}
.today-empty-ico{font-size:32px;margin-bottom:8px;opacity:.5}

/* ── OUTSTANDING VIEW ─────────────────────────────────────────── */
.outstanding-total{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-xl);padding:18px 20px;
  margin-bottom:14px;
  display:flex;align-items:center;justify-content:space-between;
}
.outstanding-total-left{}
.outstanding-label{font-size:11px;font-weight:600;color:var(--ink-3);margin-bottom:5px}
.outstanding-amt{font-size:32px;font-weight:800;color:var(--red);letter-spacing:-1.5px;line-height:1}
.outstanding-sub{font-size:11.5px;color:var(--ink-4);margin-top:5px}

/* ── ACTIVITY TIMELINE ───────────────────────────────────────── */
.timeline{padding:4px 0}
.tl-entry{display:flex;gap:12px;padding:0 0 16px;position:relative}
.tl-entry::before{
  content:'';position:absolute;left:11px;top:24px;
  width:1px;bottom:0;background:var(--line);
}
.tl-entry:last-child::before{display:none}
.tl-dot{
  width:23px;height:23px;border-radius:50%;
  background:var(--surface);border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;flex-shrink:0;color:var(--ink-4);
  position:relative;z-index:1;margin-top:1px;
}
.tl-dot.done{border-color:var(--amber);background:var(--amber-bg);color:var(--amber-t)}
.tl-body{flex:1;min-width:0;padding-top:2px}
.tl-msg{font-size:12.5px;font-weight:600;color:var(--ink-1);line-height:1.4}
.tl-ts{font-size:10.5px;color:var(--ink-4);margin-top:3px;font-weight:400}
.tl-empty{
  text-align:center;padding:32px;
  font-size:12.5px;color:var(--ink-4);font-style:italic;
}

/* ── SCREENING SCORECARD ─────────────────────────────────────── */
.scorecard{margin-bottom:12px}
.scorecard-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 0;border-bottom:1px solid var(--line-s);
}
.scorecard-row:last-child{border-bottom:none}
.scorecard-domain{font-size:12.5px;font-weight:500;color:var(--ink-2);flex:1;min-width:0}
.score-opts{display:flex;gap:4px;flex-shrink:0}
.score-btn{
  width:36px;height:26px;border-radius:4px;
  border:1px solid var(--line);background:var(--bg);
  font-size:10.5px;font-weight:700;
  cursor:pointer;transition:all .1s;color:var(--ink-4);
  display:flex;align-items:center;justify-content:center;
}
.score-btn:hover{border-color:var(--ink-4);color:var(--ink-1)}
.score-btn.sel{border-color:transparent;color:#fff}

/* ── SIBLING LINK ────────────────────────────────────────────── */
.sibling-card{
  display:flex;align-items:center;gap:10px;
  background:var(--bg);border:1px solid var(--line);
  border-radius:var(--r-md);padding:9px 12px;margin-bottom:6px;
}
.sibling-info{flex:1;min-width:0}
.sibling-name{font-size:12.5px;font-weight:600;color:var(--ink-1)}
.sibling-meta{font-size:11.5px;color:var(--ink-3);margin-top:1px}
.sibling-unlink{
  font-size:11px;font-weight:600;color:var(--red);
  background:var(--red-bg);border:1px solid var(--red-b);
  padding:3px 9px;border-radius:4px;cursor:pointer;
  transition:all .12s;
}
.sibling-unlink:hover{background:var(--red-b)}

/* ── SEAT CAPACITY BARS ──────────────────────────────────────── */
.seat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.seat-card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r-lg);padding:13px 14px;
}
.seat-prog{font-size:11px;font-weight:700;color:var(--ink-2);margin-bottom:6px}
.seat-nums{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.seat-filled{font-size:20px;font-weight:800;color:var(--ink-1);letter-spacing:-.5px;line-height:1}
.seat-total{font-size:11.5px;color:var(--ink-4);font-weight:500}
.seat-bar-wrap{height:4px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.seat-bar{height:100%;border-radius:99px;transition:width .4s ease}

/* ── SOURCE ANALYTICS ────────────────────────────────────────── */
.source-row{margin-bottom:10px}
.source-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.source-name{font-size:12px;font-weight:500;color:var(--ink-2)}
.source-stats{font-size:11px;color:var(--ink-3);font-weight:500}
.source-track{height:4px;background:var(--bg);border-radius:99px;overflow:hidden;border:1px solid var(--line)}
.source-fill{height:100%;border-radius:99px;background:var(--navy-3);transition:width .5s ease}

/* ── RAIL NOTIFICATION DOT ───────────────────────────────────── */
.rail-notify{
  width:6px;height:6px;border-radius:50%;
  background:var(--red);flex-shrink:0;
}

/* ══════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════ */
#login-screen{
  position:fixed;inset:0;
  background:linear-gradient(145deg,#131008 0%,#1C1710 45%,#0F0D08 100%);
  display:flex;align-items:center;justify-content:center;
  z-index:9999;
  padding:20px;
}
#login-screen::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%, rgba(245,168,0,.08) 0%, transparent 65%);
  pointer-events:none;
}
#login-screen.hidden{display:none}
.login-card{
  background:#fff;border-radius:22px;
  width:100%;max-width:400px;
  padding:44px 40px 38px;
  box-shadow:0 40px 100px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
  animation:mIn .32s cubic-bezier(.16,1,.3,1) both;
  position:relative;
}
.login-bee{
  width:68px;height:68px;
  background:linear-gradient(135deg,#F5B020 0%,#E07800 100%);
  border-radius:18px;display:flex;align-items:center;
  justify-content:center;font-size:32px;
  margin:0 auto 18px;
  box-shadow:0 8px 28px rgba(245,158,11,.45), 0 0 0 1px rgba(245,158,11,.2);
}
.login-title{
  text-align:center;font-size:23px;font-weight:800;
  color:#1C1A14;letter-spacing:-.5px;margin-bottom:4px;
  font-family:var(--font-display);
}
.login-sub{
  text-align:center;font-size:12.5px;color:#8A7F6A;
  font-weight:400;margin-bottom:30px;
}
.login-lbl{
  display:block;font-size:10.5px;font-weight:700;
  color:#7C7361;text-transform:uppercase;letter-spacing:.7px;
  margin-bottom:6px;margin-top:16px;
}
.login-lbl:first-of-type{margin-top:0}
.login-inp{
  width:100%;border:1.5px solid #E6DBCA;border-radius:11px;
  padding:11px 14px;font-size:14.5px;font-family:inherit;
  color:#1C1A14;background:#FAF7F0;outline:none;
  box-sizing:border-box;transition:border-color .15s,box-shadow .15s,background .1s;
}
.login-inp:focus{
  border-color:var(--honey);background:#fff;
  box-shadow:var(--honey-glow);
}
.login-btn{
  width:100%;margin-top:24px;padding:13px;
  background:linear-gradient(145deg,#F5B020 0%,#E08000 100%);
  border:1px solid rgba(0,0,0,.08);border-radius:11px;
  color:#fff;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;
  transition:all .15s;
  box-shadow:0 4px 16px rgba(200,100,0,.32), 0 2px 4px rgba(0,0,0,.1);
}
.login-btn:hover{
  background:linear-gradient(145deg,#FFBA2A 0%,#E89200 100%);
  box-shadow:0 6px 20px rgba(200,100,0,.4);
  transform:translateY(-1px);
}
.login-btn:active{transform:scale(.98)}
.login-err{
  margin-top:12px;padding:10px 14px;
  background:#FEF1F1;border:1px solid var(--red-b);
  border-radius:9px;color:var(--red);
  font-size:13px;font-weight:600;text-align:center;
  display:none;
}
.login-err.show{display:block}
.login-footer{
  text-align:center;margin-top:22px;
  font-size:10.5px;color:#A89D88;letter-spacing:.1px;
}
.pw-wrap{position:relative}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  font-size:16px;color:#A89D88;padding:0;line-height:1;
}


/* ── PREMIUM POLISH OVERRIDES ──────────── */
/* Smooth scrolling throughout */
*{scroll-behavior:smooth}

/* Content area subtle pattern */
#content{
  background:var(--cream);
  background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,.03) 1px, transparent 0);
  background-size:24px 24px;
}

/* Table headers premium feel */
th{
  background:linear-gradient(180deg,var(--bg) 0%,#F0E8D5 100%) !important;
  font-size:9.5px;font-weight:700;
  padding:10px 14px;text-align:left;white-space:nowrap;
  border-bottom:1px solid var(--line);
  color:var(--muted);text-transform:uppercase;letter-spacing:.7px;
}

/* Better progress dots */
.pd{
  width:20px;height:20px;border-radius:50%;border:1.5px solid;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;flex-shrink:0;transition:all .2s;
  box-shadow:0 1px 3px rgba(0,0,0,.08);
}

/* Rail toggle premium */
#rail-toggle:hover{background:linear-gradient(135deg,#F5B020,#E08000);width:22px;}

/* Funnel bars premium */
.f-track{height:6px;background:var(--cream);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.06)}
.f-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* List group headers */
.list-group-head{
  font-size:9.5px;font-weight:700;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;
  margin-bottom:7px;padding:0 3px;
}
.list-group-n{
  font-size:10px;font-weight:600;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);
  padding:1px 8px;border-radius:99px;
}

/* Dash table hover */
.dash-tbl tr:hover td{background:var(--petal) !important;cursor:pointer;color:var(--ink)}

/* Better today panel */
.d-panel{box-shadow:var(--shadow-card)}

/* Better seat numbers */
.seat-filled{font-size:28px;font-weight:800;letter-spacing:-1.2px;font-family:var(--font-display)}

/* Seat bar track */
.seat-bar-wrap{height:5px;background:var(--cream);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,.05)}

/* Better interest cards */
.int-card{
  background:linear-gradient(145deg,var(--cream) 0%,var(--petal) 100%);
  border-radius:12px;padding:14px 16px;text-align:center;
  border:1px solid var(--line);
}
.int-n{font-size:24px;font-weight:800;color:var(--ink);font-family:var(--font-display);letter-spacing:-.6px}

/* Smoother body font rendering */
body{font-size:14.5px;letter-spacing:-.01px}

/* ── QUICK-ADD OVERLAY ── */
#qa-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center;padding:20px}
#qa-overlay.open{display:flex}
#qa-box{background:var(--surface);border-radius:16px;width:100%;max-width:500px;box-shadow:0 24px 48px rgba(0,0,0,.45);overflow:hidden}
#qa-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(135deg,#1C1917,#292524);color:#FFF2D2;font-weight:700;font-size:14px}
#qa-head button{background:rgba(255,255,255,.12);border:none;color:#FFF2D2;border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
#qa-body{padding:18px}
.qa-hint{background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:9px 12px;font-size:12px;color:#1D4ED8;font-weight:600;margin-bottom:14px}
.qa-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.qa-row.full{grid-template-columns:1fr}
.qa-fld label{display:block;font-size:11.5px;font-weight:700;color:var(--ink2);margin-bottom:4px}
.qa-fld input,.qa-fld select{width:100%;box-sizing:border-box;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;background:var(--bg);color:var(--ink);font-family:inherit;outline:none}
.qa-fld input:focus,.qa-fld select:focus{border-color:var(--amber-h);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.qa-req{color:#EF4444;margin-left:2px}
.qa-footer{display:flex;gap:8px;padding:0 18px 18px;justify-content:flex-end}
.qa-footer button{padding:9px 20px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;border:none}
.qa-btn-save{background:linear-gradient(135deg,#F59E0B,#D97706);color:#1C1917}
.qa-btn-cancel{background:var(--line);color:var(--ink2)}

/* ═══════════════ HELPERS ═══════════════ */
function el(id){return document.getElementById(id)}

function si(k){for(var i=0;i<STEPS.length;i++)if(STEPS[i].key===k)return i;return 0}

function clone(o){return JSON.parse(JSON.stringify(o))}
function tag(label,c,bg,sz){sz=sz||11;return'<span class="tag" style="background:'+bg+';color:'+c+';font-size:'+sz+'px">'+label+'</span>'}

function deriveStage(l){
  if(l.fee.done&&l.fee.amountPaid&&l.fee.receiptNo)return"fee";
  if(l.admissionForm.done&&l.admissionForm.offerSent&&l.admissionForm.parentAccepted&&l.admissionForm.schoolConfirmed)return"admission";
  if(l.screening.done&&(l.screening.result==="Ready for admission"||l.screening.result==="Ready with conditions"))return"screening";
  if(l.counselling.done&&l.counselling.outcome==="Positive")return"counselling";
  if(l.firstBuzz.done)return"first_buzz";
  if(l.outreach.visitBooked)return"outreach";
  return"outreach";
}

function setNV(o,path,val){
  var p=path.split("."),c=o;
  for(var i=0;i<p.length-1;i++){if(c[p[i]]===undefined)c[p[i]]={};c=c[p[i]];}
  c[p[p.length-1]]=val;
}

function isWeekend(d){var day=d.getDay();return day===0||day===6}
function isPast(d){var today=new Date();today.setHours(0,0,0,0);return d<today}

/* ═══════════════ CALENDAR COMPONENT ═══════════════ */
function initCal(prefix){
  if(!calState[prefix]){
    var now=new Date();
    calState[prefix]={year:now.getFullYear(),month:now.getMonth(),selectedDate:"",selectedTime:""};
  }
}

function renderCal(prefix,selectedDate,selectedTime,onDatePath,onTimePath){
  initCal(prefix);
  var cs=calState[prefix];
  var y=cs.year,m=cs.month;
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  var DOWS=["Su","Mo","Tu","We","Th","Fr","Sa"];
  var firstDay=new Date(y,m,1).getDay();
  var daysInMonth=new Date(y,m+1,0).getDate();
  var today=new Date();today.setHours(0,0,0,0);

  var dowHtml=DOWS.map(function(d){return'<div class="cal-dow">'+d+'</div>'}).join("");
  var dayHtml="";
  for(var i=0;i<firstDay;i++)dayHtml+='<div class="cal-day cal-other"></div>';
  for(var d=1;d<=daysInMonth;d++){
    var dt=new Date(y,m,d);
    var dateStr=y+"-"+pad2(m+1)+"-"+pad2(d);
    var cls="cal-day";
    if(dt.getTime()===today.getTime())cls+=" cal-today";
    if(dateStr===selectedDate)cls+=" cal-selected";
    if(isPast(dt))cls+=" cal-past";
    else if(isWeekend(dt))cls+=" cal-weekend";
    var click=(isPast(dt)||isWeekend(dt))?"":"onclick=\"calSelectDate('"+prefix+"','"+dateStr+"','"+onDatePath+"','"+onTimePath+"')\"";
    dayHtml+='<div class="'+cls+'" '+click+'>'+d+'</div>';
  }

  var slotsHtml="";
  if(selectedDate){
    slotsHtml='<div style="padding:10px 12px 2px;font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.4px">Select Time Slot</div>'+
      '<div class="slot-grid" style="padding:8px 12px 12px">';
    for(var t=0;t<TIME_SLOTS.length;t++){
      var sl=TIME_SLOTS[t];
      var selCls=sl===selectedTime?" sel":"";
      slotsHtml+='<button class="slot-btn'+selCls+'" onclick="calSelectTime(\''+prefix+'\',\''+sl+'\',\''+onTimePath+'\')">'+sl+'</button>';
    }
    slotsHtml+='</div>';
  }

  var booked=(selectedDate&&selectedTime)?
    '<div class="booked-slot">📅 '+fmtDate(selectedDate)+' at '+selectedTime+'<button onclick="calClear(\''+prefix+'\',\''+onDatePath+'\',\''+onTimePath+'\')">Change</button></div>':
    "";

  return booked+
    '<div class="cal-wrap">'+
      '<div class="cal-hd">'+
        '<button class="cal-nav" onclick="calNav(\''+prefix+'\',-1,\''+onDatePath+'\',\''+onTimePath+'\')">‹</button>'+
        '<span class="cal-hd-title">'+MONTHS[m]+' '+y+'</span>'+
        '<button class="cal-nav" onclick="calNav(\''+prefix+'\',1,\''+onDatePath+'\',\''+onTimePath+'\')">›</button>'+
      '</div>'+
      '<div class="cal-grid">'+dowHtml+dayHtml+'</div>'+
    '</div>'+
    slotsHtml;
}

function fmtDate(ds){
  if(!ds)return"";
  var p=ds.split("-");
  var MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return p[2]+"-"+MONTHS[parseInt(p[1])-1]+"-"+p[0];
}

function calNav(prefix,dir,dp,tp){
  initCal(prefix);
  var cs=calState[prefix];
  cs.month+=dir;
  if(cs.month<0){cs.month=11;cs.year--;}
  if(cs.month>11){cs.month=0;cs.year++;}
  renderPanel();
}
function calSelectDate(prefix,dateStr,dp,tp){
  initCal(prefix);
  calState[prefix].selectedDate=dateStr;
  calState[prefix].selectedTime="";
  setNV(cLead,dp,dateStr);
  setNV(cLead,tp,"");
  renderPanel();
}
function calSelectTime(prefix,time,tp){
  initCal(prefix);
  calState[prefix].selectedTime=time;
  setNV(cLead,tp,time);
  cLead.stage=deriveStage(cLead);
  renderPanel();
}
function calClear(prefix,dp,tp){
  initCal(prefix);
  calState[prefix].selectedDate="";
  calState[prefix].selectedTime="";
  setNV(cLead,dp,"");
  setNV(cLead,tp,"");
  renderPanel();
}

/* ═══════════════ SEED ═══════════════ */
function seed(){
  leads=[];

}


/* ═══════════════ FILTER ═══════════════ */
function getFlt(){
  var q=(el("search").value||"").toLowerCase().trim();
  return leads.filter(function(l){
    var ms=!q||l.parentName.toLowerCase().indexOf(q)>-1||l.phone.indexOf(q)>-1||(l.childName||"").toLowerCase().indexOf(q)>-1||(l.bbkId||"").toLowerCase().indexOf(q)>-1;
    var mf=stageFlt==="All"||l.stage===stageFlt;
    return ms&&mf;
  });
}

/* ═══════════════ RAIL ═══════════════ */
function rail(stage){
  var ci=si(stage),h="";
  for(var i=0;i<STEPS.length;i++){
    var s=STEPS[i],d=i<ci,a=i===ci;
    var bg=d?s.color:a?"#fff":"#F3F4F6";
    var bc=d||a?s.color:"#E5E7EB";
    var col=d?"#fff":a?s.color:"#9CA3AF";
    var sh=a?"box-shadow:0 0 0 3px "+s.color+"28;":"";
    h+='<div class="pd" title="'+s.label+'" style="background:'+bg+';border-color:'+bc+';color:'+col+';'+sh+'">'+(d?"✓":s.emoji)+'</div>';
    if(i<STEPS.length-1)h+='<div class="pl" style="background:'+(d?s.color:"#F3F4F6")+'"></div>';
  }
  return h;
}

/* ═══════════════ CARD ═══════════════ */
function card(l){
  var step=gs(l.stage);
  var intC={
    "Very High":{c:"var(--green)",  bg:"var(--green-bg)", bc:"var(--green-b)"},
    "High":     {c:"var(--amber-h)",bg:"var(--amber-bg)", bc:"var(--amber-b)"},
    "Medium":   {c:"var(--violet)", bg:"var(--violet-bg)",bc:"var(--violet-b)"},
    "Low":      {c:"var(--red)",    bg:"var(--red-bg)",   bc:"var(--red-b)"},
    "Not Interested":{c:"var(--muted)",bg:"var(--bg)",bc:"var(--line)"}
  };
  var ic=intC[l.interestLevel];
  var ib=ic?'<span class="pill" style="background:'+ic.bg+';color:'+ic.c+';border-color:'+ic.bc+'">'+l.interestLevel+'</span>':"";
  var eb=l.fee.done?'<span class="pill" style="background:var(--green-bg);color:var(--green);border-color:var(--green-b)">Enrolled</span>':"";
  var pb=l.outreach.visitBooked&&!l.outreach.visitDone?'<span class="pill" style="background:var(--amber-bg);color:var(--amber-h);border-color:var(--amber-b)">Visit booked</span>':"";
  var progList=l.programs&&l.programs.length?l.programs:(l.program?[l.program]:[]);
  var MAX_PROG=2;
  var prog=progList.slice(0,MAX_PROG).map(function(p){
    return '<span class="pill" style="background:'+step.bg+';color:'+step.color+';border-color:'+step.color+'40;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;vertical-align:middle">'+esc(p)+'</span>';
  }).join('');
  if(progList.length>MAX_PROG)prog+='<span class="pill" style="background:#F3F4F6;color:#6B7280;border-color:#E5E7EB">+' +(progList.length-MAX_PROG)+' more</span>';
  var displayName=l.childName||l.parentName;
  var meta=(l.childName?l.parentName+" · ":"")+l.phone+(l.childAge?" · "+l.childAge:"");
  return '<div class="lead-card" style="border-left-color:'+step.color+'" onclick="openLead('+l.id+')">'+
    // Row 1: avatar + child name + interest pill
    '<div class="card-r1">'+
      '<div class="av" style="background:'+av(l.id)+'">'+ini(l.parentName)+'</div>'+
      '<div class="card-info">'+
        '<div class="card-name">'+esc(displayName)+'</div>'+
        '<div class="card-meta">'+esc(meta)+'</div>'+
      '</div>'+
      (ib?'<div class="card-ib">'+ib+'</div>':'')+
    '</div>'+
    // Row 2: programme pills (only if set)
    ((prog||pb||eb)?'<div class="card-r2">'+prog+pb+eb+'</div>':'')+
    // Row 3: progress rail
    '<div class="card-rail">'+rail(l.stage)+'</div>'+
    // Row 4: stage label + BBK ID
    '<div class="card-r3">'+
      '<span class="card-stage">'+
        '<span class="card-stage-dot" style="background:'+step.color+'"></span>'+step.label+
      '</span>'+
      '<span class="card-id">'+esc(l.bbkId||"")+'</span>'+
    '</div>'+
  '</div>';
}

  for(var i=0;i<views.length;i++){
    var vEl=el("view-"+views[i]);if(vEl)vEl.style.display="none";
    var sb=el("sb-"+views[i]);if(sb)sb.classList.remove("on");
  }
  var vn=el("view-"+v);if(vn)vn.style.display="block";
  if(v==="pipeline"){var vp=el("view-pipeline");if(vp)vp.style.display="block";}
  var sb2=el("sb-"+v);if(sb2)sb2.classList.add("on");
  var t=el("bar-title");if(t)t.textContent=titles[v]||v;
  renderView();
}

function renderView(){
  buildChips();
  var f=getFlt();
  var lc=el("lead-count");if(lc)lc.textContent=f.length+" leads";
  var bs=el("bar-sub");if(bs)bs.textContent=stageFlt==="All"?"All":stageFlt;
  if(view==="leads")rLeads(f);
  else if(view==="pipeline")rPipeline(f);
  else if(view==="dashboard")rDashboard();
  else if(view==="table")rTable(f);
  else if(view==="today")rToday();
  else if(view==="outstanding")rOutstanding();
}

function buildChips(){
  var h='<button class="chip'+(stageFlt==="All"?" on":"")+ '" onclick="setFlt(\'All\')">All</button>';
  for(var i=0;i<STEPS.length;i++){var s=STEPS[i];h+='<button class="chip'+(stageFlt===s.key?" on":"")+ '" onclick="setFlt(\''+s.key+'\')">'+s.emoji+' '+s.label+'</button>';}
  el("chips").innerHTML=h;
}
function setFlt(k){stageFlt=k;renderView()}

function rPipeline(f){
  var out="";
  for(var i=0;i<STEPS.length;i++){
    var s=STEPS[i],cards=f.filter(function(l){return l.stage===s.key});
    out+='<div class="stage-col">'+
      '<div class="stage-head">'+
        '<span class="stage-dot" style="background:'+s.color+'"></span>'+
        '<span class="stage-name">'+s.label+'</span>'+
        '<span class="stage-n" style="background:'+s.color+'18;color:'+s.color+'">'+cards.length+'</span>'+
      '</div>'+
      (cards.length?cards.map(card).join(''):'<div class="stage-empty">No leads</div>')+
    '</div>';
  }
  el("pipeline-scroll").innerHTML=out;
}

function leadScore(l){
  var s=0;
  var prog=(l.program||"").toLowerCase();
  // Session interest via program type
  if(prog.indexOf("todd")+prog.indexOf("playhouse")+prog.indexOf("pre-k")+prog.indexOf("k1")+prog.indexOf("k2")>-5)s+=30; // Morning Prep
  if(prog.indexOf("activity")>-1)s+=0; // Evening only – no extra points
  // Visit
  if(l.outreach.visitBooked)s+=20;
  if(l.outreach.visitDone)s+=20;
  // Discovery Flight
  if(l.screening.done)s+=15;
  // WhatsApp responded
  if(l.outreach.waSent)s+=10;
  // Sibling
  if(l.firstBuzz&&l.firstBuzz.siblingName)s+=10;
  return Math.min(s,100);
}

function scoreLabel(s){
  if(s>=80)return{lbl:"🔥 Hot",  color:"#E05252"};
  if(s>=50)return{lbl:"🌼 Warm", color:"#FF8C00"};
  if(s>=20)return{lbl:"💧 Mild", color:"#5B8EE6"};
  return       {lbl:"❄ Cold", color:"#B0A690"};
}

/* ── STAGE GATE HELPERS ── */
function isStageComplete(key){
  var l=cLead;
  if(!l)return false;
  var fb=l.firstBuzz||{},o=l.outreach||{},c=l.counselling||{},s=l.screening||{},a=l.admissionForm||{};
  switch(key){
    case"outreach":
      // Father/parent name + phone + call status required. Mother name is optional for event leads.
      return !!(fb.fatherName&&l.phone&&o.callStatus);
    case"first_buzz":
      return !!(fb.done&&fb.childDOB&&fb.motherName&&fb.fatherName);
    case"counselling":
      return !!(c.done&&c.outcome==="Positive");
    case"screening":
      return !!(s.done&&(s.result==="Ready for admission"||s.result==="Ready with conditions"));
    case"admission":
      return !!(a.done&&a.offerSent&&a.parentAccepted&&a.docsSubmitted&&a.schoolConfirmed);
    case"fee":
      return !!(l.fee&&l.fee.done&&l.fee.amountPaid&&l.fee.receiptNo);
    default:return false;
  }
}
function canAccessTab(key){
  var idx=si(key);
  if(idx===0)return true;
  for(var i=0;i<idx;i++){if(!isStageComplete(STEPS[i].key))return false;}
  return true;
}

function setAtab(k){
  if(!canAccessTab(k)){
    var idx=si(k);
    for(var i=0;i<idx;i++){
      if(!isStageComplete(STEPS[i].key)){
        toast("🔒 Complete \""+STEPS[i].label+"\" first to unlock this section");
        return;
      }
    }
    return;
  }
  atab=k;renderMdl();
}
function qset(path,val){
  // Coerce string booleans for boolean fields
  var boolPaths=["outreach.waSent","outreach.visitBooked","outreach.visitDone","outreach.calendlyBooked","outreach.followUpNeeded","outreach.prepSchoolMorning","outreach.activityCenterEvening","outreach.summerCampInterest","firstBuzz.done","counselling.done","counselling.screeningSlotBooked","screening.done","admissionForm.done","admissionForm.offerSent","admissionForm.parentAccepted","admissionForm.docsSubmitted","admissionForm.schoolConfirmed","fee.done"];
  if(boolPaths.indexOf(path)>-1&&typeof val==="string"){val=(val==="true"||val===true);}
  setNV(cLead,path,val);
  // Auto-populate counselling date from visit date when session is marked done
  if(path==="counselling.done"&&val&&!cLead.counselling.date&&cLead.outreach.visitDate){
    cLead.counselling.date=cLead.outreach.visitDate;
  }
  // Auto-sync: when parentName set, also reflect in header
  if(path==="childName"){cLead.childName=val;}
  if(path==="firstBuzz.fatherName"){
    cLead.firstBuzz.fatherName=val;
    // Use father name as parentName if parentName empty
    if(!cLead.parentName)cLead.parentName=val;
  }
  // Bug 4: auto-fill program into fee.program and counselling if not already set
  if(path==="program"&&val){
    if(!cLead.fee.program)cLead.fee.program=val;
  }
  // Update callStatus side-effects
  if(path==="outreach.callStatus"){
    cLead.outreach.callDone=(val==="Called");
    if(cLead.outreach.callDone&&!cLead.outreach.callDate)cLead.outreach.callDate=new Date().toISOString().slice(0,10);
  }
  // Update waSent side-effects
  if(path==="outreach.waSent"&&val===true){
    if(!cLead.outreach.waDate)cLead.outreach.waDate=new Date().toISOString().slice(0,10);
  }
  cLead.stage=deriveStage(cLead);
  renderMdl();
}

function toggleProgram(p){
  if(!cLead)return;
  if(!cLead.programs)cLead.programs=[];
  var idx=cLead.programs.indexOf(p);
  if(idx>-1)cLead.programs.splice(idx,1);
  else cLead.programs.push(p);
  // Keep legacy l.program in sync with first selected program
  cLead.program=cLead.programs.length?cLead.programs[0]:"";
  // Auto-fill fee program if not set
  if(cLead.program&&!cLead.fee.program)cLead.fee.program=cLead.program;
  cLead.stage=deriveStage(cLead);
  renderMdl();
}
function qsetProgram(val){
  if(!cLead)return;
  cLead.program=val;
  if(!cLead.programs)cLead.programs=[];
  if(val&&cLead.programs.indexOf(val)===-1)cLead.programs.unshift(val);
  else if(!val)cLead.programs=[];
  if(val&&!cLead.fee.program)cLead.fee.program=val;
  cLead.stage=deriveStage(cLead);
  renderMdl();
}

function renderPanel(){
  var p="";
  if(atab==="outreach")p=pOutreach();
  else if(atab==="first_buzz")p=pFirstBuzz();
  else if(atab==="counselling")p=pCounselling();
  else if(atab==="screening")p=pScreening();
  else if(atab==="admission")p=pAdmission();
  else if(atab==="fee")p=pFee();
  else if(atab==="timeline")p=pTimeline();
  el("mpanel").innerHTML=p;
  // wire checkboxes
  var cks=el("mpanel").querySelectorAll("[data-p]");
  cks.forEach(function(c){
    c.addEventListener("change",function(){qset(c.dataset.p,c.type==="checkbox"?c.checked:c.value)});
    if(c.dataset.phone){
      c.addEventListener("input",function(){
        var v=c.value.replace(/\D/g,"").slice(0,10);
        if(v!==c.value)c.value=v;
      });
    }
  });
  // wire programme multi-select tiles
  var progs=el("mpanel").querySelectorAll("[data-prog]");
  progs.forEach(function(d){
    d.addEventListener("click",function(){toggleProgram(d.dataset.prog);});
  });
  // wire score buttons (data-domain + data-opt) - legacy
  var sbs=el("mpanel").querySelectorAll(".score-btn");
  sbs.forEach(function(b){
    b.addEventListener("click",function(){setScore(b.dataset.domain,b.dataset.opt);});
  });
  // wire Discovery Flight qa buttons (data-qa + data-qaopt)
  var qabs=el("mpanel").querySelectorAll("[data-qa][data-qaopt]");
  qabs.forEach(function(b){

      var k=b.dataset.qa,v=b.dataset.qaopt;
      cLead.screening.qa[k]=cLead.screening.qa[k]===v?"":v;
      renderPanel();
    });
  });
  // wire Discovery Flight qa text inputs (data-qa without data-qaopt)
  var qatxts=el("mpanel").querySelectorAll("[data-qa]:not([data-qaopt])");
  qatxts.forEach(function(inp){
    inp.addEventListener("change",function(){
      if(!cLead.screening.qa)cLead.screening.qa={};
      cLead.screening.qa[inp.dataset.qa]=inp.value;

  var ditems=el("mpanel").querySelectorAll("[data-docid]");

function logActivity(lead,msg){
  if(!lead.activityLog)lead.activityLog=[];
  lead.activityLog.push({ts:new Date().toISOString(),msg:msg});
}
function diffAndLog(old,neo){
  if(!neo.activityLog)neo.activityLog=[];
  var msgs=[];
  if(!old)msgs.push("Lead created — "+neo.parentName);
  else{
    if(!old.outreach.callDone&&neo.outreach.callDone)msgs.push("Call completed");
    if(!old.outreach.waSent&&neo.outreach.waSent)msgs.push("WhatsApp sent");
    if(!old.outreach.visitBooked&&neo.outreach.visitBooked)msgs.push("Visit booked — "+(neo.outreach.visitDate||""));
    if(!old.outreach.visitDone&&neo.outreach.visitDone)msgs.push("Visit completed");
    if(!old.firstBuzz.done&&neo.firstBuzz.done)msgs.push("First Buzz form received");
    if(!old.counselling.done&&neo.counselling.done)msgs.push("Counselling done — "+(neo.counselling.outcome||""));
    if(!old.counselling.screeningSlotBooked&&neo.counselling.screeningSlotBooked)msgs.push("Screening booked — "+(neo.counselling.screeningDate||""));
    if(!old.screening.done&&neo.screening.done)msgs.push("Screening done — "+(neo.screening.result||""));
    if(!old.admissionForm.offerSent&&neo.admissionForm.offerSent)msgs.push("Offer sent to parents");
    if(!old.admissionForm.parentAccepted&&neo.admissionForm.parentAccepted)msgs.push("Parents accepted offer");
    if(!old.admissionForm.docsSubmitted&&neo.admissionForm.docsSubmitted)msgs.push("Documents submitted");
    if(!old.admissionForm.schoolConfirmed&&neo.admissionForm.schoolConfirmed)msgs.push("Admission confirmed by school");
    if(!old.fee.done&&neo.fee.done)msgs.push("Fee recorded — ₹"+(neo.fee.amountPaid||"")+" via "+(neo.fee.paymentMode||""));
    if(old.stage!==neo.stage)msgs.push("Stage changed → "+gs(neo.stage).label);
    if(neo.siblingIds&&old.siblingIds&&neo.siblingIds.length>old.siblingIds.length)msgs.push("Sibling lead linked");
  }
  msgs.forEach(function(m){logActivity(neo,m);});
  neo.lastTouched=new Date().toISOString().slice(0,10);
}
function saveLead(){
  if(!cLead)return;
  cLead.stage=deriveStage(cLead);
  var prev=null;
  if(editId!==null){
    for(var i=0;i<leads.length;i++)if(leads[i].id===editId){prev=JSON.parse(JSON.stringify(leads[i]));leads[i]=cLead;break;}
  }else leads.push(cLead);
  diffAndLog(prev,cLead);
  closeMdl();
  lsSave();
  renderView();
  toast(editId?"✓ Lead updated":"✓ New lead added — "+cLead.bbkId);
}

/* ═══════════════ SCRIPTS / TEMPLATES ═══════════════ */
function openScript(type){
  var key=type==="call"?"call_script":"wa_initial";
  scriptKey=key;
  el("s-ttl").textContent=type==="call"?"📞 Scripts & Templates":"💬 WhatsApp Templates";
  buildScriptTabs(type);

function buildScriptTabs(type){
  var keys=type==="call"?["call_script"]:["wa_initial","wa_visit_reminder","wa_first_buzz","wa_screening","wa_offer","wa_fee_done"];
  var h="";
  for(var i=0;i<keys.length;i++){
    var k=keys[i],t=TEMPLATES[k];
    h+='<button class="s-tab'+(scriptKey===k?" on":"")+ '" onclick="selectTemplate(\''+k+'\',\''+type+'\')">'+t.label+'</button>';
  }
  el("s-tabs").innerHTML=h;
  el("s-pre").textContent=TEMPLATES[scriptKey].text;
}

function selectTemplate(key,type){
  scriptKey=key;
  buildScriptTabs(type);
}

function closeScript(){el("soverlay").classList.remove("open");document.body.style.overflow=""}
function soclk(e){if(e.target===el("soverlay"))closeScript()}
function copyScript(){

  navigator.clipboard.writeText(txt).then(function(){
    el("copy-btn").textContent="✓ Copied!";el("copy-btn").classList.add("cpd");
    setTimeout(function(){el("copy-btn").textContent="📋 Copy to Clipboard";el("copy-btn").classList.remove("cpd")},2200);
  });
}


/* ════════════════════════════════════════════════════════════════
   FEATURE 1 — TODAY'S ACTION LIST
════════════════════════════════════════════════════════════════ */
function getTodayStr(){
  var d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()<9?"0":"")+(d.getMonth()+1)+"-"+(d.getDate()<10?"0":"")+d.getDate();
}
function daysSince(ds){
  if(!ds)return 999;
  var diff=new Date()-new Date(ds);
  return Math.floor(diff/86400000);
}

function markDone(id,ev){
  if(ev)ev.stopPropagation();
  var l=leads.find(function(x){return x.id===id});
  if(!l)return;
  l.lastTouched=new Date().toISOString().slice(0,10);
  l.outreach=l.outreach||{};
  l.outreach.callDone=true;
  lsSave();
  showToast("✓ Check-in marked done");
  renderView();
}

function rToday(){
  var today=getTodayStr();
  var visits=[], screenings=[], stale=[], feeFollowup=[];

  leads.forEach(function(l){
    if(l.outreach.visitBooked&&!l.outreach.visitDone&&l.outreach.visitDate===today)
      visits.push(l);
    if(l.counselling.screeningSlotBooked&&!l.screening.done&&l.counselling.screeningDate===today)
      screenings.push(l);
    var touched=l.lastTouched||"";
    if(!l.fee.done&&daysSince(touched)>=7&&l.stage!=="outreach")
      stale.push({lead:l,days:daysSince(touched)});
    if(l.admissionForm.schoolConfirmed&&!l.fee.done)
      feeFollowup.push(l);
  });

  var totalActions=visits.length+screenings.length+stale.length+feeFollowup.length;
  var tn=el("today-notify");
  if(tn)tn.style.display=totalActions>0?"inline-block":"none";

  function sec(title,dot,n,rows){
    if(!rows)return"";
    return'<div class="today-section">'+
      '<div class="today-section-head">'+
        '<span class="today-section-dot" style="background:'+dot+'"></span>'+title+
        '<span class="today-section-n">'+n+'</span>'+
      '</div>'+rows+
    '</div>';
  }
  function arow(l,ico,bg,detail,badge,bcolor,bbg){
    var dn=l.childName||l.parentName;
    return'<div class="action-row" style="border-left-color:'+bg+'" onclick="openLead('+l.id+')">'+
      '<div class="action-ico" style="background:'+bbg+'">'+ico+'</div>'+
      '<div class="action-info">'+
        '<div class="action-name">'+esc(dn)+'</div>'+
        '<div class="action-detail">'+esc(detail)+'</div>'+
      '</div>'+
      '<div class="action-meta">'+
        '<span class="card-id">'+esc(l.bbkId||"")+'</span>'+
        (badge?'<span class="action-urgent" style="background:'+bbg+';color:'+bcolor+'">'+badge+'</span>':"")+
      '</div>'+
    '</div>';
  }

  var vRows=visits.map(function(l){return arow(l,"🏫","var(--blue)","Visit today · "+(l.outreach.visitTime||"")+" · "+esc(l.program||""),l.outreach.visitTime||"","var(--blue)","var(--blue-bg)")}).join("");
  var sRows=screenings.map(function(l){return arow(l,"🔍","var(--violet)","Screening today · "+(l.counselling.screeningTime||"")+" · "+esc(l.program||""),l.counselling.screeningTime||"","var(--violet)","var(--violet-bg)")}).join("");
  var staleRows=stale.map(function(s){return arow(s.lead,"⏱","var(--orange)","No activity for "+s.days+" days · "+gs(s.lead.stage).label,s.days+"d idle","var(--orange)","var(--orange-bg)")}).join("");
  var feeRows=feeFollowup.map(function(l){return arow(l,"💰","var(--red)","Admitted · fee not collected · "+esc(l.program||""),"Fee due","var(--red)","var(--red-bg)")}).join("");

  var body="";
  if(visits.length)   body+=sec("Visits today",    "var(--blue)",   visits.length,   vRows);
  if(screenings.length)body+=sec("Screenings today","var(--violet)", screenings.length,sRows);
  if(feeFollowup.length)body+=sec("Fee follow-up",  "var(--red)",    feeFollowup.length,feeRows);
  if(stale.length)    body+=sec("Stale leads",      "var(--orange)", stale.length,    staleRows);

  if(!body){
    body='<div class="today-empty">'+
      '<div class="today-empty-ico">✅</div>'+
      '<div style="font-weight:700;font-size:14px;color:var(--ink-2);margin-bottom:4px">All clear for today</div>'+
      '<div>No visits, screenings, or follow-ups due</div>'+
    '</div>';
  }
  el("view-today").innerHTML=body;
}

function pTimeline(){
  var log=cLead.activityLog||[];

    return'<div class="tl-empty">No activity recorded yet.<br>Save changes to start tracking.</div>';
  }
  var sorted=log.slice().reverse();
  return'<div class="timeline">'+sorted.map(function(e){
